<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Beaubouef Bracket 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3C0;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e14;--surface:#12171f;--card:#1a2030;--card-hover:#1f2738;--accent:#e8a838;--accent2:#fff;--accent3:#e8a838;--accent-dim:rgba(232,168,56,0.15);--green:#4ade80;--red:#ef4444;--blue:#4a90d9;--text:#e6e6e6;--muted:rgba(255,255,255,0.35);--border:rgba(255,255,255,0.08);--font-display:'Oswald',sans-serif;--font-body:'Source Sans 3',-apple-system,sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
::selection{background:var(--accent);color:var(--accent2)}

/* GATE */
.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.gate-emoji{font-size:56px;margin-bottom:8px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.gate-sub{font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:4px;color:var(--accent);text-transform:uppercase}
.gate-title{font-family:var(--font-display);font-size:32px;font-weight:700;margin:4px 0 28px;letter-spacing:2px}
.gate input{width:100%;max-width:300px;padding:14px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#fff;font-size:16px;text-align:center;outline:none;transition:border-color 0.2s;margin-bottom:10px}
.gate input:focus{border-color:var(--accent)}
.gate-btn{margin-top:6px;padding:13px 48px;border-radius:8px;border:none;background:var(--accent);color:var(--accent2);font-family:var(--font-display);font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:transform 0.1s}
.gate-btn:active{transform:scale(0.97)}
.gate-err{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}
.gate-divider{display:flex;align-items:center;gap:12px;width:100%;max-width:300px;margin:18px 0;color:var(--muted);font-size:11px}
.gate-divider::before,.gate-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.player-list{margin-top:12px;width:100%;max-width:300px}
.player-btn{width:100%;padding:12px 16px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:600;text-align:left;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between}
.player-btn:hover{background:var(--card-hover);border-color:var(--accent)}
.player-btn .arrow{color:var(--muted);font-size:12px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar-brand{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.topbar-user{font-size:13px;font-weight:600;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-locked{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-saving{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-viewing{background:rgba(74,144,217,0.15);color:var(--blue)}
.btn-sm{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:11px;transition:all 0.15s}
.btn-sm:hover{background:rgba(255,255,255,0.1);color:var(--text)}

/* SCORE STRIP */
.score-strip{display:flex;align-items:center;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.score-strip::-webkit-scrollbar{display:none}
.ss-stat{text-align:center;min-width:48px;flex-shrink:0}
.ss-val{font-family:var(--font-display);font-size:16px;font-weight:700}
.ss-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.ss-div{width:1px;height:24px;background:var(--border);flex-shrink:0}
.ss-rounds{display:flex;gap:2px;flex-shrink:0}
.ss-rd{text-align:center;padding:2px 5px;border-radius:3px;min-width:32px}
.ss-rd .pts{font-family:var(--font-display);font-size:11px;font-weight:600}
.ss-rd .nm{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
.ss-rd.earned{background:rgba(74,222,128,0.12)}.ss-rd.earned .pts{color:var(--green)}
.ss-rd.zero .pts{color:rgba(255,255,255,0.15)}

/* VIEW CHIPS */
.view-chips{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:wrap}
.view-chips::-webkit-scrollbar{display:none}
.view-chips .lbl{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-right:4px;font-weight:600}
.vchip{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;font-weight:600;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.vchip:hover{background:var(--card-hover)}
.vchip.active{background:var(--accent);color:var(--accent2);border-color:var(--accent)}
.vchip.viewing{background:rgba(74,144,217,0.15);border-color:rgba(74,144,217,0.3);color:var(--blue)}

/* TABS */
.mob-tabs{display:flex;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border)}
.mob-tab{flex:1;padding:10px 2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:1px;transition:all 0.15s}
.mob-tab.active{background:var(--accent-dim);border-bottom-color:var(--accent);color:var(--accent)}
.mob-tab.icon{font-size:16px}
.mob-content{padding:10px 14px 80px;max-width:500px;margin:0 auto}

/* SECTIONS */
.sec-head{text-align:center;padding:10px 0;border-bottom:2px solid var(--accent);margin-bottom:14px}
.sec-emoji{font-size:24px}
.sec-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.sec-sub{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px}
.rd-label{font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;padding-left:4px;display:flex;align-items:baseline;gap:6px}
.rd-pts{font-weight:400;opacity:0.4;font-size:10px}
.rd-group{margin-bottom:16px}
.game-row{display:flex;gap:4px;margin-bottom:5px}

/* PICKS - accent2 used for selected text on some teams */
.pick{flex:1;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:rgba(255,255,255,0.65);font-size:12px;text-align:left;display:flex;align-items:center;gap:4px;transition:all 0.12s;position:relative}
.pick .sd{font-size:9px;opacity:0.4;min-width:14px}
.pick:hover:not(:disabled){background:var(--card-hover)}
.pick.sel{background:var(--accent);color:var(--accent2);font-weight:700;border-color:var(--accent)}
.pick.sel .sd{opacity:0.7}
.pick.win{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.35);color:var(--green);font-weight:700}
.pick.lose{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:var(--red);font-weight:700}
.pick.elim{opacity:0.25;text-decoration:line-through}
.pick.sel.elim{background:var(--card);color:var(--muted);border-color:var(--border)}
.pick.live{border-color:var(--green);background:rgba(74,222,128,0.04)}
.pick.bust{background:rgba(255,255,255,0.04);border-left:2px solid rgba(239,68,68,0.4);color:rgba(255,255,255,0.55);font-weight:600}
.bust-tag{font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:0.5px;margin-left:auto;flex-shrink:0;background:rgba(239,68,68,0.12);color:var(--red)}
.pick .ck{margin-left:auto;font-size:10px;flex-shrink:0}
.pick .sc{margin-left:auto;font-size:9px;opacity:0.6;font-weight:400;flex-shrink:0}
.pick:disabled{cursor:default}

/* CHAMP BOX */
.champ-box{text-align:center;padding:14px;background:var(--accent);border-radius:10px;margin-top:10px}
.champ-label{font-size:10px;color:var(--accent2);opacity:0.7;text-transform:uppercase;letter-spacing:1.5px;font-family:var(--font-display)}
.champ-name{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--accent2);margin-top:4px}

/* TIEBREAKER */
.tb-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;text-align:center}
.tb-box .tbl{font-family:var(--font-display);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.tb-box input{width:80px;padding:8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:#fff;font-size:16px;text-align:center;outline:none;font-family:var(--font-display)}
.tb-btn{padding:8px 16px;font-size:12px;border-radius:6px;border:none;background:var(--accent);color:var(--accent2);font-family:var(--font-display);font-weight:600;margin-left:6px}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;padding:10px 12px;margin-bottom:4px;background:var(--card);border-radius:8px;border-left:3px solid transparent;cursor:pointer;transition:all 0.15s}
.lb-row:hover{background:var(--card-hover)}
.lb-row.first{background:var(--accent-dim);border-left-color:var(--accent)}
.lb-rank{font-family:var(--font-display);font-size:18px;font-weight:700;width:28px;text-align:center}
.lb-info{flex:1;margin-left:6px}.lb-name{font-size:14px;font-weight:700}.lb-detail{font-size:10px;color:var(--muted);line-height:1.4}
.lb-score-col{text-align:right}
.lb-pts{font-family:var(--font-display);font-size:20px;font-weight:700}
.lb-max{font-size:9px;color:var(--muted)}

/* ADMIN */
.admin-btn{width:100%;padding:13px;border-radius:8px;border:none;color:#fff;font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:1px;margin-bottom:8px;transition:transform 0.1s}
.admin-btn:active{transform:scale(0.98)}
.admin-danger{background:linear-gradient(135deg,#7f1d1d,#991b1b)!important;font-size:12px!important}
.del-btn{background:none;border:none;color:var(--red);font-size:11px;padding:2px 6px;border-radius:4px;opacity:0.6;transition:opacity 0.15s}
.del-btn:hover{opacity:1;background:rgba(239,68,68,0.1)}

/* PROGRESS */
.progress-bar{height:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width 0.3s}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:340px;text-align:center}
.confirm-box h3{font-family:var(--font-display);font-size:18px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.4}
.confirm-box .btns{display:flex;gap:8px;justify-content:center}
.confirm-box .btn-cancel{padding:10px 24px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600}
.confirm-box .btn-confirm{padding:10px 24px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:600}

.desktop-bracket{display:none}
.footer{text-align:center;padding:14px;font-size:10px;color:rgba(255,255,255,0.12)}
.msg-bar{padding:8px 14px;background:var(--accent-dim);color:var(--accent);font-size:12px;text-align:center;font-weight:600}
.hidden{display:none}
.ff-label{font-size:10px;color:var(--muted);margin-bottom:3px}

/* DESKTOP */
@media(min-width:1100px){
.mobile-view{display:none!important}.desktop-bracket{display:block!important}
.bracket-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:8px 12px;max-width:1600px;margin:0 auto}
.bracket-side{display:flex;flex-direction:column;gap:20px}
.bracket-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:240px;padding:0 16px}
.region-label{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-align:center;padding:6px 0;margin-bottom:4px}
.rounds{display:flex;align-items:stretch}.rounds.rtl{flex-direction:row-reverse}
.round-col{display:flex;flex-direction:column;justify-content:space-around;min-width:130px;padding:0 3px}
.round-col-header{font-family:var(--font-display);font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 0 4px}
.bg{background:var(--card);border:1px solid var(--border);border-radius:4px;margin:2px 0;overflow:hidden;min-width:120px;font-size:11px}
.bg .tr{display:flex;align-items:center;padding:3px 6px;cursor:pointer;transition:background 0.1s;gap:3px;border-bottom:1px solid rgba(255,255,255,0.04)}
.bg .tr:last-child{border-bottom:none}
.bg .tr:hover{background:rgba(255,255,255,0.04)}
.bg .tr.picked{background:var(--accent);color:var(--accent2);font-weight:700}
.bg .tr.correct{background:rgba(74,222,128,0.1);color:var(--green);font-weight:700}
.bg .tr.incorrect{background:rgba(239,68,68,0.08);color:var(--red);font-weight:700}
.bg .tr.elim{opacity:0.25;text-decoration:line-through}
.bg .tr.live{background:rgba(74,222,128,0.04)}
.bg .tr.bust{background:rgba(255,255,255,0.04);border-left:2px solid rgba(239,68,68,0.4);color:rgba(255,255,255,0.55);font-weight:600}
.bust-tag-d{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:0.5px;margin-left:auto;flex-shrink:0;background:rgba(239,68,68,0.12);color:var(--red)}
.bg.live{border-color:var(--green)}
.bg .tr.locked{cursor:default}
.bg .ts{font-size:9px;color:var(--muted);min-width:16px;text-align:right}
.bg .tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg .tsc{font-size:9px;margin-left:auto;opacity:0.5}
.bg .tc{font-size:9px;margin-left:auto}
.bg .tr.tbd{color:var(--muted);cursor:default;font-style:italic}
.bg .tr.picked .ts{opacity:0.7}
.ff-center{text-align:center}
.ff-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.ff-game{margin-bottom:16px}
.ff-game-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;line-height:1.4}
.champion-display{margin-top:16px;padding:14px 18px;background:var(--accent);border-radius:8px}
.champion-display .label{font-family:var(--font-display);font-size:9px;letter-spacing:2px;color:var(--accent2);opacity:0.7;text-transform:uppercase}
.champion-display .name{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--accent2);margin-top:2px}
.desk-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:4px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.desk-nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 16px;border-radius:6px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.desk-nav-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.desk-nav-btn.active{background:var(--accent);color:var(--accent2);border-color:var(--accent)}
}
</style>
</head>

function $api(m,u,b){var o={method:m,headers:{"Content-Type":"application/json"}};if(b)o.body=JSON.stringify(b);return fetch(u,o).then(function(r){return r.json()});}

// ELIMINATED
function getEliminated(res){
  var e=new Set();
  RK.forEach(function(rk){
    var rR=res[rk]||{};var reg=REGIONS[rk];
    var r0=rR[0]||{};
    for(var i=0;i<reg.games.length;i++){if(r0[i]){var g=reg.games[i];e.add(r0[i]===g[1]?g[3]:g[1]);}}
    for(var rd=1;rd<4;rd++){var rdR=rR[rd]||{};var prev=rR[rd-1]||{};var cnt=8/Math.pow(2,rd);for(var g2=0;g2<cnt;g2++){if(rdR[g2]){var t1=prev[g2*2],t2=prev[g2*2+1];if(rdR[g2]===t1&&t2)e.add(t2);if(rdR[g2]===t2&&t1)e.add(t1);}}}
  });
  var ffR=res.finalFour||{};var rc=RK.map(function(r){return(res[r]||{})[3]&&(res[r]||{})[3][0]});
  if(ffR[0]){if(ffR[0][0]){if(ffR[0][0]===rc[0]&&rc[1])e.add(rc[1]);if(ffR[0][0]===rc[1]&&rc[0])e.add(rc[0]);}if(ffR[0][1]){if(ffR[0][1]===rc[2]&&rc[3])e.add(rc[3]);if(ffR[0][1]===rc[3]&&rc[2])e.add(rc[2]);}}
  if(ffR[1]&&ffR[1][0]){var s1=(ffR[0]||{})[0],s2=(ffR[0]||{})[1];if(ffR[1][0]===s1&&s2)e.add(s2);if(ffR[1][0]===s2&&s1)e.add(s1);}
  return e;
}

// SCORING
function countPicks(p){var c=0;RK.forEach(function(rk){var rp=p[rk]||{};for(var rd=0;rd<4;rd++)c+=Object.keys(rp[rd]||{}).length;});var ff=p.finalFour||{};for(var rd=0;rd<2;rd++)c+=Object.keys(ff[rd]||{}).length;return c;}

function scoreBreakdown(p,res){
  var earned=[0,0,0,0,0,0];var elim=getEliminated(res);
  RK.forEach(function(rk){var rp=p[rk]||{},rr=res[rk]||{};for(var rd=0;rd<4;rd++){var rdp=rp[rd]||{},rdr=rr[rd]||{};for(var i in rdr){if(rdp[i]&&rdp[i]===rdr[i])earned[rd]+=PTS[rd];}}});
  var ffp=p.finalFour||{},ffr=res.finalFour||{};for(var rd=0;rd<2;rd++){var rdp=ffp[rd]||{},rdr=ffr[rd]||{};for(var i in rdr){if(rdp[i]&&rdp[i]===rdr[i])earned[rd+4]+=PTS[rd+4];}}
  var total=earned.reduce(function(a,b){return a+b},0);
  var maxR=0;
  RK.forEach(function(rk){var rp=p[rk]||{},rr=res[rk]||{};for(var rd=0;rd<4;rd++){var rdp=rp[rd]||{},rdr=rr[rd]||{};var cnt=8/Math.pow(2,rd);for(var g=0;g<cnt;g++){if(rdp[g]&&!rdr[g]&&!elim.has(rdp[g]))maxR+=PTS[rd];}}});
  for(var rd=0;rd<2;rd++){var rdp2=(p.finalFour||{})[rd]||{},rdr2=(res.finalFour||{})[rd]||{};for(var g in rdp2){if(rdp2[g]&&!rdr2[g]&&!elim.has(rdp2[g]))maxR+=PTS[rd+4];}}
  return{total:total,byRound:earned,maxRemaining:maxR,maxPossible:total+maxR};
}

// Resolve play-in team names: "UMBC/Howard" -> "Howard" if resolved
function resolveTeam(tm){
  if(!tm)return tm;
  for(var i=0;i<FF_SLOTS.length;i++){
    if(tm===FF_SLOTS[i].slot&&S.ff[FF_SLOTS[i].slot]&&S.ff[FF_SLOTS[i].slot].winner){
      var w=S.ff[FF_SLOTS[i].slot].winner;
      SD[w]=FF_SLOTS[i].seed;
      return w;
    }
  }
  return tm;
}
// Check if a pick matches (handles combo name matching resolved name)
function pickMatches(pick,team){
  if(!pick||!team)return false;
  if(pick===team)return true;
  // Check if pick was combo name and team is the resolved winner
  for(var i=0;i<FF_SLOTS.length;i++){
    if(pick===FF_SLOTS[i].slot&&S.ff[FF_SLOTS[i].slot]&&S.ff[FF_SLOTS[i].slot].winner===team)return true;
    if(team===FF_SLOTS[i].slot&&S.ff[FF_SLOTS[i].slot]&&S.ff[FF_SLOTS[i].slot].winner===pick)return true;
  }
  return false;
}

// CHAMPION COLOR
function applyColors(){
  var p=ap();var champ=p.finalFour&&p.finalFour[1]&&p.finalFour[1][0];
  if(champ&&TC[champ]){
    var c=TC[champ];
    document.documentElement.style.setProperty("--accent",c.f);
    document.documentElement.style.setProperty("--accent2",c.t);
    document.documentElement.style.setProperty("--accent3",c.b||c.f);
    document.documentElement.style.setProperty("--accent-dim",c.f+"26");
  }else{
    document.documentElement.style.setProperty("--accent","#e8a838");
    document.documentElement.style.setProperty("--accent2","#000");
    document.documentElement.style.setProperty("--accent3","#e8a838");
    document.documentElement.style.setProperty("--accent-dim","rgba(232,168,56,0.15)");
  }
}

// INIT
async function init(){
  S.players=await $api("GET","/api/players");
  S.results=await $api("GET","/api/results");
  try{S.scores=await $api("GET","/api/scores");}catch(e){S.scores={};}
  try{S.ff=await $api("GET","/api/first-four");}catch(e){S.ff={};}
  var st=await $api("GET","/api/state");S.locked=st.locked||false;
  if(sessionStorage.getItem("bp")==="1")S.screen="login";
  if(sessionStorage.getItem("ba")==="1")S.isAdmin=true;
  var su=sessionStorage.getItem("bu");
  if(su&&S.players.indexOf(su)>=0){
    S.user=su;S.picks=await $api("GET","/api/picks/"+encodeURIComponent(su));
    try{var tb=await $api("GET","/api/tiebreaker/"+encodeURIComponent(su));S.tiebreaker=tb.score;}catch(e){}
    S.screen="app";
  }
  render();
  // Auto-lock at first R64 tip: March 19 2026 12:15 PM ET
  (function checkAutoLock(){
    if(S.locked)return;
    var lockTime=new Date("2026-03-19T12:15:00-04:00");
    if(new Date()>=lockTime){
      S.locked=true;
      $api("POST","/api/state",{locked:true}).then(function(){
        S.msg="\u{1F512} Brackets auto-locked! R64 tipping off!";render();
        setTimeout(function(){S.msg="";render();},5000);
      });
    }else{
      var ms=lockTime-new Date();
      if(ms>0&&ms<86400000)setTimeout(checkAutoLock,Math.min(ms,60000));
    }
  })();
  // Poll results only when locked
  setInterval(async function(){if(!S.locked)return;try{var r=await $api("GET","/api/results");var sc=await $api("GET","/api/scores");var ff=await $api("GET","/api/first-four");if(JSON.stringify(r)!==JSON.stringify(S.results)||JSON.stringify(ff)!==JSON.stringify(S.ff)){S.results=r;S.scores=sc;S.ff=ff;render();}}catch(e){}},30000);
  // Poll live scores
  async function refreshLive(){try{S.liveGames=await $api("GET","/api/live");renderLive();}catch(e){}}
  refreshLive();
  setInterval(refreshLive,60000);
}

async function savePicks(){S.saving=true;render();await $api("POST","/api/picks/"+encodeURIComponent(S.user),S.picks);S.saving=false;render();}
function setPick(rg,rd,ix,tm){
  if(S.locked||ro())return;
  if(!S.picks[rg])S.picks[rg]={};if(!S.picks[rg][rd])S.picks[rg][rd]={};
  // Toggle off
  if(S.picks[rg][rd][ix]===tm){delete S.picks[rg][rd][ix];render();clearTimeout(window._st);window._st=setTimeout(savePicks,500);return;}
  S.picks[rg][rd][ix]=tm;
  // Clear downstream
  if(rg!=="finalFour"){for(var r=rd+1;r<4;r++){if(S.picks[rg][r]){var cl={},pv=S.picks[rg][r-1]||{},ct=8/Math.pow(2,r);for(var g=0;g<ct;g++){var t1=pv[g*2],t2=pv[g*2+1],ex=S.picks[rg][r][g];if(ex&&(ex===t1||ex===t2))cl[g]=ex;}S.picks[rg][r]=cl;}}}
  render();clearTimeout(window._st);window._st=setTimeout(savePicks,500);
}

// MOBILE PICK BUTTON
function pickHTML(tm,sd,pk,rs,rg,rd,ix,elim,live,actualTm){
  // BUST: user's pick is eliminated, actual advancing team is different — show actual team with BUST
  if(tm&&actualTm&&tm!==actualTm&&elim&&elim.has(tm)){
    var asd=seed(actualTm);
    var isLive=live&&(live.status==="STATUS_IN_PROGRESS"||live.status==="STATUS_HALFTIME");
    var scH="";
    if(rs){var gs=getScore(rg,rd,ix);if(gs){var my=gs.t1===actualTm?gs.t1score:gs.t2===actualTm?gs.t2score:null;if(my!=null)scH='<span class="sc">'+my+'</span>';}}
    else if(isLive){var ls=liveTeamScore(live,actualTm);if(ls!=null)scH='<span class="sc" style="color:var(--green)">'+ls+'</span>';}
    return'<button class="pick bust'+(isLive&&!rs?" live":"")+'" disabled>'+(asd?'<span class="sd">'+asd+'</span>':'')+actualTm+'<span class="bust-tag">BUST</span>'+scH+'</button>';
  }
  if(!tm&&actualTm){
    var asd2=seed(actualTm);
    var isLive2=live&&(live.status==="STATUS_IN_PROGRESS"||live.status==="STATUS_HALFTIME");
    var scH2="";
    if(rs){var gs2=getScore(rg,rd,ix);if(gs2){var my2=gs2.t1===actualTm?gs2.t1score:gs2.t2===actualTm?gs2.t2score:null;if(my2!=null)scH2='<span class="sc">'+my2+'</span>';}}
    else if(isLive2){var ls2=liveTeamScore(live,actualTm);if(ls2!=null)scH2='<span class="sc" style="color:var(--green)">'+ls2+'</span>';}
    return'<button class="pick bust'+(isLive2&&!rs?" live":"")+'" disabled>'+(asd2?'<span class="sd">'+asd2+'</span>':'')+actualTm+'<span class="bust-tag">BUST</span>'+scH2+'</button>';
  }
  if(!tm)return'<button class="pick" disabled><span style="color:var(--muted)">TBD</span></button>';
  var cor=rs&&pk===rs&&pk===tm;
  var inc=rs&&pk&&pk!==rs&&pk===tm;
  var sel=pk===tm;
  var isElim=!cor&&!inc&&elim&&elim.has(tm);
  var c="pick";
  if(cor)c+=" win";
  else if(inc)c+=" lose";
  else if(sel&&isElim)c+=" sel elim";
  else if(sel)c+=" sel";
  var isLive=live&&(live.status==="STATUS_IN_PROGRESS"||live.status==="STATUS_HALFTIME");
  if(isLive&&!rs)c+=" live";
  var sdH=sd?'<span class="sd">'+sd+'</span>':"";
  var scH="";
  if(rs){var gs=getScore(rg,rd,ix);if(gs){var my=gs.t1===tm?gs.t1score:gs.t2===tm?gs.t2score:null;if(my!=null)scH='<span class="sc">'+my+'</span>';}}
  else if(live&&isLive){var ls=liveTeamScore(live,tm);if(ls!=null)scH='<span class="sc" style="color:var(--green)">'+ls+'</span>';}
  else{scH='<span class="sc">\u2014</span>';}
  var ckH=cor?'<span class="ck">\u2713</span>':inc?'<span class="ck">\u2717</span>':(sel&&isElim?'<span class="ck">\u2717</span>':"");
  var dis=(S.locked||ro())?"disabled":"";
  return'<button class="'+c+'" '+dis+' onclick="setPick(\''+esc(rg)+'\','+rd+','+ix+',\''+esc(tm)+'\')">'+sdH+tm+scH+ckH+'</button>';
}

function mobRegion(rk){
  var reg=REGIONS[rk],p=ap(),rP=p[rk]||{},rR=S.results[rk]||{};
  var elim=getEliminated(S.results);
  var h='<div class="sec-head" style="border-bottom-color:'+reg.color+'"><div class="sec-emoji">'+reg.emoji+'</div><div class="sec-title">'+reg.name+'</div>';
  var ch=rP[3]&&rP[3][0];
  if(ch){var ce=elim.has(ch);h+='<div class="sec-sub"'+(ce?' style="text-decoration:line-through;opacity:0.4"':'')+'>'+(S.viewing||"Your")+' pick: '+seed(ch)+' '+ch+'</div>';}
  h+='</div>';
  var cur=reg.games.map(function(g){return{s1:g[0],t1:resolveTeam(g[1]),s2:g[2],t2:resolveTeam(g[3])}});
  var actualCur=null; // null for R64 (teams are the bracket teams)
  for(var rd=0;rd<4;rd++){
    var rdP=rP[rd]||{},rdR=rR[rd]||{};
    h+='<div class="rd-group"><div class="rd-label" style="color:'+reg.color+'">'+RN[rd]+' <span class="rd-pts">'+PTS[rd]+' pts</span></div>';
    for(var i=0;i<cur.length;i++){
      var g=cur[i];
      // Actual advancing teams for this slot (from results of previous round)
      var at1=actualCur?actualCur[i].t1:g.t1;
      var at2=actualCur?actualCur[i].t2:g.t2;
      var lg=getLiveGame(at1||g.t1,at2||g.t2);
      var isLive=lg&&(lg.status==="STATUS_IN_PROGRESS"||lg.status==="STATUS_HALFTIME");
      var isScheduled=lg&&(lg.status==="STATUS_SCHEDULED"||lg.status==="STATUS_PREGAME");
      // Game info line
      if(isLive&&!rdR[i]){
        var st=liveStatusText(lg);if(lg.broadcast)st+=" \u00b7 "+lg.broadcast;
        h+='<div style="font-size:9px;color:var(--green);font-weight:600;text-align:center;padding:1px 0;display:flex;align-items:center;justify-content:center;gap:4px"><span style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s infinite"></span>'+st+'</div>';
      }else if(isScheduled&&!rdR[i]){
        var info=lg.periodLabel;if(lg.broadcast)info+=" \u00b7 "+lg.broadcast;
        h+='<div style="font-size:9px;color:var(--muted);text-align:center;padding:1px 0">'+info+'</div>';
      }else if(!rdR[i]){
        var sch=getSchedule(rk,rd,i);
        if(sch)h+='<div style="font-size:9px;color:var(--muted);text-align:center;padding:1px 0">'+sch+'</div>';
      }
      h+='<div class="game-row">'+pickHTML(g.t1,seed(g.t1),rdP[i],rdR[i],rk,rd,i,elim,lg,at1!==g.t1?at1:null)+pickHTML(g.t2,seed(g.t2),rdP[i],rdR[i],rk,rd,i,elim,lg,at2!==g.t2?at2:null)+'</div>';
    }
    h+='</div>';
    // Advance: user picks for next round, actual results for next round
    var nx=[],nxActual=[];
    for(var i2=0;i2<cur.length;i2+=2){
      nx.push({t1:rdP[i2]||null,t2:rdP[i2+1]||null});
      nxActual.push({t1:rdR[i2]||null,t2:rdR[i2+1]||null});
    }
    cur=nx;actualCur=nxActual;
  }
  return h;
}

// DESKTOP
function dtr(tm,pk,rs,rg,rd,ix,elim,live,actualTm){
  // BUST: user's pick eliminated, actual advancing team different
  if(tm&&actualTm&&tm!==actualTm&&elim&&elim.has(tm)){
    var asd=seed(actualTm);
    var isLive=live&&(live.status==="STATUS_IN_PROGRESS"||live.status==="STATUS_HALFTIME");
    var scH="";
    if(rs){var gs=getScore(rg,rd,ix);if(gs){var my=gs.t1===actualTm?gs.t1score:gs.t2===actualTm?gs.t2score:null;if(my!=null)scH='<span class="tsc">'+my+'</span>';}}
    else if(isLive){var ls=liveTeamScore(live,actualTm);if(ls!=null)scH='<span class="tsc" style="color:var(--green)">'+ls+'</span>';}
    return'<div class="tr bust'+(isLive&&!rs?" live":"")+'">'+(asd?'<span class="ts">'+asd+'</span>':'')+'<span class="tn">'+actualTm+'</span>'+'<span class="bust-tag-d">BUST</span>'+scH+'</div>';
  }
  if(!tm&&actualTm){
    var asd2=seed(actualTm);
    var isLive2=live&&(live.status==="STATUS_IN_PROGRESS"||live.status==="STATUS_HALFTIME");
    var scH2="";
    if(rs){var gs2=getScore(rg,rd,ix);if(gs2){var my2=gs2.t1===actualTm?gs2.t1score:gs2.t2===actualTm?gs2.t2score:null;if(my2!=null)scH2='<span class="tsc">'+my2+'</span>';}}
    else if(isLive2){var ls2=liveTeamScore(live,actualTm);if(ls2!=null)scH2='<span class="tsc" style="color:var(--green)">'+ls2+'</span>';}
    return'<div class="tr bust'+(isLive2&&!rs?" live":"")+'">'+(asd2?'<span class="ts">'+asd2+'</span>':'')+'<span class="tn">'+actualTm+'</span>'+'<span class="bust-tag-d">BUST</span>'+scH2+'</div>';
  }
  if(!tm)return'<div class="tr tbd"><span class="tn">TBD</span></div>';
  var sd2=seed(tm);var cor=rs&&pk===rs&&pk===tm,inc=rs&&pk&&pk!==rs&&pk===tm,sel=pk===tm;
  var isElim=!cor&&!inc&&elim&&elim.has(tm);
  var isLive=live&&(live.status==="STATUS_IN_PROGRESS"||live.status==="STATUS_HALFTIME");
  var c="tr";if(cor)c+=" correct";else if(inc)c+=" incorrect";else if(sel&&isElim)c+=" picked elim";else if(sel)c+=" picked";
  if(isLive&&!rs)c+=" live";
  if(S.locked||ro())c+=" locked";
  var scH="";
  if(rs){var gs=getScore(rg,rd,ix);if(gs){var my=gs.t1===tm?gs.t1score:gs.t2===tm?gs.t2score:null;if(my!=null)scH='<span class="tsc">'+my+'</span>';}}
  else if(live&&isLive){var ls=liveTeamScore(live,tm);if(ls!=null)scH='<span class="tsc" style="color:var(--green)">'+ls+'</span>';}
  else{scH='<span class="tsc">\u2014</span>';}
  var ckH=cor?"<span class='tc'>\u2713</span>":inc?"<span class='tc'>\u2717</span>":(sel&&isElim?"<span class='tc'>\u2717</span>":"");
  var cl=(S.locked||ro())?"":'onclick="setPick(\''+esc(rg)+'\','+rd+','+ix+',\''+esc(tm)+'\')"';
  return'<div class="'+c+'" '+cl+'>'+(sd2?'<span class="ts">'+sd2+'</span>':'')+'<span class="tn">'+tm+'</span>'+scH+ckH+'</div>';
}

// === LIVE GAME LOOKUP ===
function getLiveGame(t1,t2){
  if(!S.liveGames||!S.liveGames.length||!t1||!t2)return null;
  // Skip unresolved combo slots - First Four banner handles those
  if(t1.indexOf("/")>=0||t2.indexOf("/")>=0)return null;
  for(var i=0;i<S.liveGames.length;i++){
    var g=S.liveGames[i];
    var a=g.away.name,hm=g.home.name;
    if((a===t1&&hm===t2)||(a===t2&&hm===t1))return g;
  }
  return null;
}
function liveStatusText(g){
  if(!g)return"";
  var isLive=g.status==="STATUS_IN_PROGRESS"||g.status==="STATUS_HALFTIME";
  if(isLive){var t=g.periodLabel;if(g.clock)t+=" \u00b7 "+g.clock;return t;}
  if(g.status==="STATUS_SCHEDULED"||g.status==="STATUS_PREGAME")return g.periodLabel||"Scheduled";
  return g.periodLabel||"";
}
function liveTeamScore(g,teamName){
  if(!g)return null;
  if(g.away.name===teamName)return g.away.score;
  if(g.home.name===teamName)return g.home.score;
  // Check FF sub-team names
  for(var i=0;i<FF_SLOTS.length;i++){
    var sl=FF_SLOTS[i];
    if(teamName===sl.slot){
      if(g.away.name===sl.teams[0]||g.away.name===sl.teams[1])return g.away.score;
      if(g.home.name===sl.teams[0]||g.home.name===sl.teams[1])return g.home.score;
    }
  }
  return null;
}

  if(S.screen==="login"){var pb="";if(S.players.length){pb='<div class="player-list">';S.players.forEach(function(p){pb+='<button class="player-btn" onclick="loginExisting(\''+esc(p)+'\')">'+p+'<span class="arrow">\u2192</span></button>';});pb+='</div>';}document.getElementById("app").innerHTML='<div class="gate"><div class="gate-emoji">\u{1F3C0}</div><div class="gate-sub">Welcome</div><div class="gate-title">WHO ARE YOU?</div>'+(S.players.length?'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Returning? Tap your name:</div>'+pb+'<div class="gate-divider">or new player</div>':'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Enter your name to get started</div>')+'<input id="fn" placeholder="First name" autocapitalize="words"><input id="ln" placeholder="Last name" autocapitalize="words" onkeydown="if(event.key===\'Enter\')loginNew()"><button class="gate-btn" onclick="loginNew()">Join</button><div id="le" class="gate-err"></div></div>';return;}

  var cnt=countPicks(ap()),pct=Math.round(cnt/63*100);
  var tabs=["east","south","west","midwest","f4","board","admin"];
  var labels={east:"E",south:"S",west:"W",midwest:"MW",f4:"\u{1F3C6}",board:"\u{1F4CA}",admin:"\u2699\uFE0F"};
  var dtabs=["bracket","board","admin"],dlabels={bracket:"Bracket",board:"Leaderboard",admin:"Admin"};
  var mt=tabs.map(function(t){return'<button class="mob-tab'+(t===S.tab?" active":"")+(["f4","board","admin"].indexOf(t)>=0?" icon":"")+'" onclick="S.tab=\''+t+'\';render()">'+labels[t]+'</button>'}).join("");
  var dn=dtabs.map(function(t){return'<button class="desk-nav-btn'+(t===S.deskTab?" active":"")+'" onclick="S.deskTab=\''+t+'\';render()">'+dlabels[t]+'</button>'}).join("");
  var badges="";if(S.locked)badges+='<span class="topbar-badge badge-locked">Locked</span>';if(S.saving)badges+='<span class="topbar-badge badge-saving">Saving</span>';if(S.viewing)badges+='<span class="topbar-badge badge-viewing">\u{1F440} '+S.viewing.split(" ")[0]+'</span>';

  var mc="";if(RK.indexOf(S.tab)>=0)mc=mobRegion(S.tab);else if(S.tab==="f4")mc=mobFF();else if(S.tab==="admin")mc=mobAdmin();else if(S.tab==="board")mc='<div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div>';

  var dc="";if(S.deskTab==="bracket")dc='<div class="bracket-wrap"><div class="bracket-side">'+deskRegion("east",false)+deskRegion("south",false)+'</div><div class="bracket-center">'+deskFF()+'</div><div class="bracket-side">'+deskRegion("west",true)+deskRegion("midwest",true)+'</div></div>';else if(S.deskTab==="admin")dc='<div style="max-width:500px;margin:20px auto;padding:0 16px">'+mobAdmin()+'</div>';else if(S.deskTab==="board")dc='<div id="db" style="max-width:500px;margin:20px auto;padding:0 16px"><div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div></div>';

  document.getElementById("app").innerHTML='<div class="topbar"><div><div class="topbar-brand">Beaubouef Bracket \'26</div><div class="topbar-user">'+S.user+'</div></div><div class="topbar-right">'+badges+'<button class="btn-sm" onclick="exportMyPicks()" title="Export my picks">\u{1F4E5}</button><button class="btn-sm" onclick="importMyPicks()" title="Import picks">\u{1F4E4}</button><button class="btn-sm" onclick="switchUser()">Switch</button></div></div>'+(S.msg?'<div class="msg-bar">'+S.msg+'</div>':"")+nagBannerHTML()+firstFourHTML()+scoreStripHTML()+viewChipsHTML()+'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="mobile-view"><div class="mob-tabs">'+mt+'</div><div class="mob-content" id="tc">'+mc+'</div></div><div class="desktop-bracket"><div class="desk-nav">'+dn+'<button class="desk-nav-btn" onclick="doSync()" style="margin-left:20px">\u{1F504} ESPN</button></div>'+dc+'</div><div class="footer">'+cnt+'/63 ('+pct+'%)'+(S.viewing?" \u2014 "+S.viewing:"")+'</div>';

  if(S.tab==="board")renderBoard("tc");
  if(S.deskTab==="board")renderBoard("db");
}
init();

</script>
