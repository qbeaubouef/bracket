<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Beaubouef Bracket 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:rgba(255,255,255,0.04);--gold:#e8a838;--green:#4ade80;--red:#ef4444;--text:#fff;--muted:rgba(255,255,255,0.4);--border:rgba(255,255,255,0.08)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.login-emoji{font-size:48px;margin-bottom:8px}
.login-sub{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.login-title{font-size:24px;font-weight:900;margin:4px 0 24px}
.login input{width:100%;max-width:280px;padding:14px 16px;border-radius:12px;border:1px solid rgba(232,168,56,0.3);background:rgba(255,255,255,0.05);color:#fff;font-size:16px;text-align:center;outline:none}
.login input:focus{border-color:var(--gold)}
.login-btn{margin-top:12px;padding:12px 40px;border-radius:10px;border:none;background:linear-gradient(135deg,#e8a838,#d4791c);color:#000;font-size:15px;font-weight:800;letter-spacing:0.5px}
.login-players{margin-top:24px;color:var(--muted);font-size:12px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(180deg,rgba(232,168,56,0.1) 0%,transparent 100%)}
.header-brand{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.header-user{font-size:14px;font-weight:600}
.header-saving{font-size:10px;color:var(--green)}
.header-locked{font-size:10px;color:var(--red);font-weight:700;text-transform:uppercase;margin-right:8px}
.switch-btn{background:rgba(255,255,255,0.08);border:none;color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px}
.tabs{display:flex;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:9px 2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:0.5px;transition:all 0.15s}
.tab.active{background:rgba(232,168,56,0.15);border-bottom-color:var(--gold);color:var(--gold)}
.tab.icon{font-size:16px}
.content{padding:8px 12px 80px}
.section-head{text-align:center;padding:10px 0;border-bottom:2px solid var(--gold);margin-bottom:12px}
.section-emoji{font-size:24px}
.section-title{font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.section-sub{font-size:12px;color:var(--gold);font-weight:600;margin-top:2px}
.round-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;padding-left:4px}
.round-group{margin-bottom:14px}
.game{display:flex;gap:4px;margin-bottom:6px}
.pick-btn{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:rgba(255,255,255,0.7);font-size:13px;font-weight:400;text-align:left;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.pick-btn .seed{font-size:10px;opacity:0.5;min-width:16px}
.pick-btn.selected{background:rgba(232,168,56,0.2);border-color:rgba(232,168,56,0.4);color:var(--gold);font-weight:700}
.pick-btn.correct{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.4);color:var(--green);font-weight:700}
.pick-btn.incorrect{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:var(--red);font-weight:700}
.pick-btn .check{margin-left:auto;font-size:11px}
.pick-btn:disabled{opacity:0.5;cursor:default}
.champ-box{text-align:center;padding:12px;background:linear-gradient(135deg,rgba(232,168,56,0.15),rgba(232,168,56,0.05));border-radius:10px;border:1px solid rgba(232,168,56,0.3);margin-top:8px}
.champ-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.champ-name{font-size:22px;font-weight:900;color:var(--gold);margin-top:4px}
.lb-item{display:flex;align-items:center;padding:10px 12px;margin-bottom:4px;background:var(--card);border-radius:10px;border-left:3px solid transparent}
.lb-item.first{background:rgba(232,168,56,0.12);border-left-color:var(--gold)}
.lb-rank{font-size:18px;font-weight:800;width:32px;text-align:center}
.lb-info{flex:1}
.lb-name{font-size:15px;font-weight:700}
.lb-detail{font-size:11px;color:var(--muted)}
.lb-score{font-size:20px;font-weight:900}
.admin-btn{width:100%;padding:14px;border-radius:10px;border:none;color:#fff;font-size:14px;font-weight:700;margin-bottom:10px}
.msg{padding:8px 14px;background:rgba(232,168,56,0.15);color:var(--gold);font-size:12px;text-align:center}
.footer{text-align:center;padding:16px;font-size:10px;color:rgba(255,255,255,0.15)}
.hidden{display:none}
.ff-matchup-label{font-size:10px;color:var(--muted);margin-bottom:3px}
</style>
</head>
<body>

<div id="app"></div>

<script>
const REGIONS={east:{name:"East",emoji:"🏛️",color:"#4a90d9",games:[[1,"Duke",16,"Siena"],[8,"Ohio State",9,"TCU"],[5,"St. John's",12,"Northern Iowa"],[4,"Kansas",13,"Cal Baptist"],[6,"Louisville",11,"South Florida"],[3,"Michigan State",14,"North Dakota St."],[7,"UCLA",10,"UCF"],[2,"UConn",15,"Furman"]]},south:{name:"South",emoji:"🌴",color:"#c0392b",games:[[1,"Florida",16,"PV A&M/Lehigh"],[8,"Clemson",9,"Iowa"],[5,"Vanderbilt",12,"McNeese"],[4,"Nebraska",13,"Troy"],[6,"North Carolina",11,"VCU"],[3,"Illinois",14,"Penn"],[7,"Saint Mary's",10,"Texas A&M"],[2,"Houston",15,"Idaho"]]},west:{name:"West",emoji:"🌵",color:"#cc0033",games:[[1,"Arizona",16,"LIU"],[8,"Villanova",9,"Utah State"],[5,"Wisconsin",12,"High Point"],[4,"Arkansas",13,"Hawaii"],[6,"BYU",11,"Texas/NC State"],[3,"Gonzaga",14,"Kennesaw State"],[7,"Miami FL",10,"Missouri"],[2,"Purdue",15,"Queens"]]},midwest:{name:"Midwest",emoji:"🏭",color:"#f0c040",games:[[1,"Michigan",16,"UMBC/Howard"],[8,"Georgia",9,"Saint Louis"],[5,"Texas Tech",12,"Akron"],[4,"Alabama",13,"Hofstra"],[6,"Tennessee",11,"Miami OH/SMU"],[3,"Virginia",14,"Wright State"],[7,"Kentucky",10,"Santa Clara"],[2,"Iowa State",15,"Tennessee State"]]}};
const ROUND_NAMES=["Round of 64","Round of 32","Sweet 16","Elite 8"];
const REGION_KEYS=["east","south","west","midwest"];
const REGION_NAMES={east:"East",south:"South",west:"West",midwest:"Midwest"};
const POINTS=[10,20,40,80,160,320];

let state={user:null,picks:{},results:{},players:[],locked:false,tab:"east",saving:false,msg:""};

const api=async(method,url,body)=>{
  const opts={method,headers:{"Content-Type":"application/json"}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  return r.json();
};

async function init(){
  state.players=await api("GET","/api/players");
  state.results=await api("GET","/api/results");
  const s=await api("GET","/api/state");
  state.locked=s.locked||false;
  render();
}

async function login(name){
  if(!name.trim())return;
  state.user=name.trim();
  state.players=await api("POST","/api/players",{name:state.user});
  state.picks=await api("GET",`/api/picks/${encodeURIComponent(state.user)}`);
  render();
}

async function savePicks(){
  state.saving=true;render();
  await api("POST",`/api/picks/${encodeURIComponent(state.user)}`,state.picks);
  state.saving=false;render();
}

function setPick(region,round,idx,team){
  if(state.locked)return;
  if(!state.picks[region])state.picks[region]={};
  if(!state.picks[region][round])state.picks[region][round]={};
  state.picks[region][round][idx]=team;
  if(region!=="finalFour"){
    for(let r=round+1;r<4;r++){
      if(state.picks[region][r]){
        const cleared={};
        const prev=state.picks[region][r-1]||{};
        const count=8/Math.pow(2,r);
        for(let g=0;g<count;g++){
          const t1=prev[g*2],t2=prev[g*2+1];
          const ex=state.picks[region][r][g];
          if(ex&&(ex===t1||ex===t2))cleared[g]=ex;
        }
        state.picks[region][r]=cleared;
      }
    }
  }
  render();
  clearTimeout(window._saveTimer);
  window._saveTimer=setTimeout(savePicks,500);
}

function countPicks(p){
  let c=0;
  for(const rk of REGION_KEYS){const rp=p[rk]||{};for(let rd=0;rd<4;rd++){c+=Object.keys(rp[rd]||{}).length;}}
  const ff=p.finalFour||{};for(let rd=0;rd<2;rd++)c+=Object.keys(ff[rd]||{}).length;
  return c;
}

function calcScore(p,res){
  let s=0;
  for(const rk of REGION_KEYS){const rp=p[rk]||{};const rr=res[rk]||{};for(let rd=0;rd<4;rd++){const rdp=rp[rd]||{};const rdr=rr[rd]||{};for(const i in rdr){if(rdp[i]&&rdp[i]===rdr[i])s+=POINTS[rd];}}}
  const ffp=p.finalFour||{};const ffr=res.finalFour||{};for(let rd=0;rd<2;rd++){const rdp=ffp[rd]||{};const rdr=ffr[rd]||{};for(const i in rdr){if(rdp[i]&&rdp[i]===rdr[i])s+=POINTS[rd+4];}}
  return s;
}

function esc(s){return s.replace(/'/g,"\\'");}

function pickBtnHTML(team,seed,pick,result,region,round,idx){
  if(!team)return`<button class="pick-btn" disabled><span style="color:var(--muted)">TBD</span></button>`;
  const correct=result&&pick===result&&pick===team;
  const incorrect=result&&pick&&pick!==result&&pick===team;
  const selected=pick===team;
  let cls="pick-btn";
  if(correct)cls+=" correct";else if(incorrect)cls+=" incorrect";else if(selected)cls+=" selected";
  const seedHTML=seed?`<span class="seed">(${seed})</span>`:"";
  const checkHTML=correct?`<span class="check">✓</span>`:incorrect?`<span class="check">✗</span>`:"";
  const disabled=state.locked?"disabled":"";
  return`<button class="${cls}" ${disabled} onclick="setPick('${esc(region)}',${round},${idx},'${esc(team)}')">${seedHTML}${team}${checkHTML}</button>`;
}

function renderRegion(regionKey){
  const region=REGIONS[regionKey];
  const rPicks=state.picks[regionKey]||{};
  const rResults=state.results[regionKey]||{};
  let html=`<div class="section-head" style="border-bottom-color:${region.color}"><div class="section-emoji">${region.emoji}</div><div class="section-title">${region.name}</div>`;
  const champ=rPicks[3]?.[0];
  if(champ)html+=`<div class="section-sub">Your pick: ${champ}</div>`;
  html+=`</div>`;
  let currentGames=region.games.map(g=>({s1:g[0],t1:g[1],s2:g[2],t2:g[3]}));
  for(let rd=0;rd<4;rd++){
    const rdPicks=rPicks[rd]||{};
    const rdResults=rResults[rd]||{};
    html+=`<div class="round-group"><div class="round-label" style="color:${region.color}">${ROUND_NAMES[rd]}</div>`;
    for(let i=0;i<currentGames.length;i++){
      const g=currentGames[i];
      const pick=rdPicks[i];
      const result=rdResults[i];
      html+=`<div class="game">${pickBtnHTML(g.t1,rd===0?g.s1:null,pick,result,regionKey,rd,i)}${pickBtnHTML(g.t2,rd===0?g.s2:null,pick,result,regionKey,rd,i)}</div>`;
    }
    html+=`</div>`;
    let next=[];
    for(let i=0;i<currentGames.length;i+=2)next.push({t1:rdPicks[i]||null,t2:rdPicks[i+1]||null});
    currentGames=next;
  }
  return html;
}

function renderFinalFour(){
  const champs=REGION_KEYS.map(r=>(state.picks[r]||{})[3]?.[0]||null);
  const ffPicks=state.picks.finalFour||{};
  const ffResults=state.results.finalFour||{};
  const s1Pick=(ffPicks[0]||{})[0];
  const s2Pick=(ffPicks[0]||{})[1];
  const champPick=(ffPicks[1]||{})[0];
  const s1Result=(ffResults[0]||{})[0];
  const s2Result=(ffResults[0]||{})[1];
  const champResult=(ffResults[1]||{})[0];

  let html=`<div class="section-head"><div class="section-emoji">🏆</div><div class="section-title">Final Four</div></div>`;
  html+=`<div class="round-group"><div class="round-label" style="color:var(--gold)">Semifinals</div>`;
  html+=`<div class="ff-matchup-label">${REGION_NAMES.east} vs ${REGION_NAMES.south}</div>`;
  html+=`<div class="game">${pickBtnHTML(champs[0],null,s1Pick,s1Result,"finalFour",0,0)}${pickBtnHTML(champs[1],null,s1Pick,s1Result,"finalFour",0,0)}</div>`;
  html+=`<div class="ff-matchup-label">${REGION_NAMES.west} vs ${REGION_NAMES.midwest}</div>`;
  html+=`<div class="game">${pickBtnHTML(champs[2],null,s2Pick,s2Result,"finalFour",0,1)}${pickBtnHTML(champs[3],null,s2Pick,s2Result,"finalFour",0,1)}</div></div>`;
  html+=`<div class="round-group"><div class="round-label" style="color:var(--gold)">Championship</div>`;
  html+=`<div class="game">${pickBtnHTML(s1Pick,null,champPick,champResult,"finalFour",1,0)}${pickBtnHTML(s2Pick,null,champPick,champResult,"finalFour",1,0)}</div></div>`;
  if(champPick)html+=`<div class="champ-box"><div class="champ-label">Your Champion</div><div class="champ-name">🏆 ${champPick} 🏆</div></div>`;
  return html;
}

async function renderLeaderboard(){
  const allPicks=await api("GET","/api/all-picks");
  let sorted=state.players.map(p=>({name:p,score:calcScore(allPicks[p]||{},state.results),picks:countPicks(allPicks[p]||{}),champion:(allPicks[p]?.finalFour||{})[1]?.[0]||"—"})).sort((a,b)=>b.score-a.score||b.picks-a.picks);
  let html=`<div class="section-head"><div class="section-emoji">📊</div><div class="section-title">Leaderboard</div><div style="font-size:11px;color:var(--muted);margin-top:2px">R64=10 / R32=20 / S16=40 / E8=80 / F4=160 / Champ=320</div></div>`;
  if(sorted.length===0)html+=`<div style="text-align:center;color:var(--muted);padding:20px">No players yet</div>`;
  sorted.forEach((p,i)=>{
    html+=`<div class="lb-item${i===0?" first":""}"><div class="lb-rank" style="color:${i===0?"var(--gold)":"var(--muted)"}">${i+1}</div><div class="lb-info"><div class="lb-name">${p.name}</div><div class="lb-detail">${p.picks}/63 picks · Champ: ${p.champion}</div></div><div class="lb-score" style="color:${i===0?"var(--gold)":"#fff"}">${p.score}</div></div>`;
  });
  document.getElementById("tab-content").innerHTML=html;
}

async function toggleLock(){
  state.locked=!state.locked;
  await api("POST","/api/state",{locked:state.locked});
  render();
}

async function manualResult(region,round,idx,team){
  if(!state.results[region])state.results[region]={};
  if(!state.results[region][round])state.results[region][round]={};
  state.results[region][round][idx]=team;
  await api("POST","/api/results",state.results);
  render();
}

function renderAdmin(){
  let html=`<div class="section-head"><div class="section-emoji">⚙️</div><div class="section-title">Admin</div></div>`;
  html+=`<button class="admin-btn" style="background:${state.locked?"linear-gradient(135deg,#4ade80,#22c55e)":"linear-gradient(135deg,#ef4444,#dc2626)"}" onclick="toggleLock()">${state.locked?"🔓 Unlock Brackets (allow edits)":"🔒 Lock All Brackets (no more edits)"}</button>`;
  html+=`<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Players (${state.players.length})</div>`;
  state.players.forEach(p=>{
    html+=`<div style="padding:6px 10px;background:var(--card);border-radius:6px;margin-bottom:3px;font-size:13px;color:rgba(255,255,255,0.7)">${p}</div>`;
  });
  html+=`</div>`;

  // Manual result entry - show next unresolved game per region
  html+=`<div style="margin-top:20px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Enter Results</div>`;
  html+=`<div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5">Tap the winner as games finish. Results propagate automatically.</div>`;
  for(const rk of REGION_KEYS){
    const region=REGIONS[rk];
    const rResults=state.results[rk]||{};
    let currentGames=region.games.map(g=>({t1:g[1],t2:g[3]}));
    let shownForRegion=false;
    for(let rd=0;rd<4;rd++){
      const rdResults=rResults[rd]||{};
      for(let i=0;i<currentGames.length;i++){
        const g=currentGames[i];
        if(!g.t1||!g.t2)continue;
        const result=rdResults[i];
        if(!result&&!shownForRegion){
          html+=`<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center"><span style="font-size:10px;color:${region.color};width:52px;font-weight:700">${region.name}</span>`;
          html+=`<button class="pick-btn" style="flex:1;font-size:11px;padding:6px" onclick="manualResult('${rk}',${rd},${i},'${esc(g.t1)}')">${g.t1}</button>`;
          html+=`<button class="pick-btn" style="flex:1;font-size:11px;padding:6px" onclick="manualResult('${rk}',${rd},${i},'${esc(g.t2)}')">${g.t2}</button></div>`;
          shownForRegion=true;
        }
      }
      let next=[];
      for(let i=0;i<currentGames.length;i+=2){
        next.push({t1:rdResults[i]||null,t2:rdResults[i+1]||null});
      }
      currentGames=next;
    }
  }
  html+=`</div>`;
  html+=`<div style="margin-top:20px;font-size:11px;color:var(--muted);line-height:1.5"><p>Share this URL with the family. Everyone enters their name and picks winners. Lock brackets before Thursday's tip-off.</p></div>`;
  return html;
}

function render(){
  if(!state.user){
    document.getElementById("app").innerHTML=`
      <div class="login">
        <div class="login-emoji">🏀</div>
        <div class="login-sub">2026 NCAA Tournament</div>
        <div class="login-title">BEAUBOUEF BRACKET</div>
        <input id="name-input" placeholder="Enter your name" onkeydown="if(event.key==='Enter')login(this.value)">
        <button class="login-btn" onclick="login(document.getElementById('name-input').value)">LET'S GO</button>
        ${state.players.length?`<div class="login-players">Players: ${state.players.join(", ")}</div>`:""}
      </div>`;
    return;
  }

  const tabs=["east","south","west","midwest","f4","board","admin"];
  const labels={east:"E",south:"S",west:"W",midwest:"MW",f4:"🏆",board:"📊",admin:"⚙️"};
  let tabsHTML=tabs.map(t=>`<button class="tab${t===state.tab?" active":""}${["f4","board","admin"].includes(t)?" icon":""}" onclick="state.tab='${t}';render()">${labels[t]}</button>`).join("");

  let content="";
  if(REGION_KEYS.includes(state.tab))content=renderRegion(state.tab);
  else if(state.tab==="f4")content=renderFinalFour();
  else if(state.tab==="admin")content=renderAdmin();
  else if(state.tab==="board")content="<div style='text-align:center;padding:20px;color:var(--muted)'>Loading...</div>";

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="header-brand">Beaubouef Bracket</div><div class="header-user">${state.user} ${state.saving?'<span class="header-saving">saving...</span>':""}</div></div>
      <div style="display:flex;align-items:center">${state.locked?'<span class="header-locked">Locked</span>':""}
        <button class="switch-btn" onclick="state.user=null;state.picks={};render()">Switch</button>
      </div>
    </div>
    <div class="tabs">${tabsHTML}</div>
    <div id="msg" class="msg hidden"></div>
    <div class="content" id="tab-content">${content}</div>
    <div class="footer">${countPicks(state.picks)}/63 picks made</div>`;

  if(state.tab==="board")renderLeaderboard();
}

init();
</script>
</body>
</html>
