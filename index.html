<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Beaubouef Bracket 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e14;--surface:#12171f;--card:#1a2030;--card-hover:#1f2738;--accent:#e8a838;--accent2:#FFFFFF;--accent-dim:rgba(232,168,56,0.15);--green:#4ade80;--red:#ef4444;--blue:#4a90d9;--text:#e6e6e6;--muted:rgba(255,255,255,0.35);--border:rgba(255,255,255,0.08);--font-display:'Oswald',sans-serif;--font-body:'Source Sans 3',-apple-system,sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
::selection{background:var(--accent);color:var(--accent2)}
.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;background:radial-gradient(ellipse at 50% 30%,color-mix(in srgb,var(--accent) 6%,transparent) 0%,transparent 60%)}
.gate-emoji{font-size:56px;margin-bottom:8px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.gate-sub{font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:4px;color:var(--accent);text-transform:uppercase}
.gate-title{font-family:var(--font-display);font-size:32px;font-weight:700;margin:4px 0 28px;letter-spacing:2px}
.gate input{width:100%;max-width:300px;padding:14px 18px;border-radius:10px;border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);background:rgba(255,255,255,0.04);color:#fff;font-size:16px;text-align:center;outline:none;transition:border-color 0.2s;margin-bottom:10px}
.gate input:focus{border-color:var(--accent)}
.gate-btn{margin-top:6px;padding:13px 48px;border-radius:8px;border:none;background:var(--accent);color:var(--accent2);font-family:var(--font-display);font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:transform 0.1s}
.gate-btn:active{transform:scale(0.97)}
.gate-err{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}
.gate-divider{display:flex;align-items:center;gap:12px;width:100%;max-width:300px;margin:18px 0;color:var(--muted);font-size:11px}
.gate-divider::before,.gate-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.player-list{margin-top:12px;width:100%;max-width:300px}
.player-btn{width:100%;padding:12px 16px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:600;text-align:left;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between}
.player-btn:hover{background:var(--card-hover);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
.player-btn .arrow{color:var(--muted);font-size:12px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar-brand{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.topbar-user{font-size:13px;font-weight:600;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-locked{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-saving{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-viewing{background:rgba(74,144,217,0.15);color:var(--blue)}
.btn-sm{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:11px;transition:all 0.15s}
.btn-sm:hover{background:rgba(255,255,255,0.1);color:var(--text)}

/* SCORE STRIP */
.score-strip{display:flex;align-items:center;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.score-strip::-webkit-scrollbar{display:none}
.ss-stat{text-align:center;min-width:48px;flex-shrink:0}
.ss-stat .val{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--accent)}
.ss-stat .lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.ss-div{width:1px;height:24px;background:var(--border);flex-shrink:0}
.ss-rounds{display:flex;gap:2px;flex-shrink:0}
.ss-rd{text-align:center;padding:2px 5px;border-radius:3px;min-width:32px}
.ss-rd .pts{font-family:var(--font-display);font-size:11px;font-weight:600}
.ss-rd .nm{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
.ss-rd.earned{background:rgba(74,222,128,0.1)}.ss-rd.earned .pts{color:var(--green)}

/* VIEW CHIPS */
.view-chips{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.view-chips::-webkit-scrollbar{display:none}
.view-chips .lbl{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.vchip{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;font-weight:600;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.vchip:hover{background:var(--card-hover)}
.vchip.active{background:var(--accent-dim);border-color:color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent)}
.vchip.viewing{background:rgba(74,144,217,0.12);border-color:rgba(74,144,217,0.3);color:var(--blue)}

/* TABS */
.mob-tabs{display:flex;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border)}
.mob-tab{flex:1;padding:10px 2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:1px;transition:all 0.15s}
.mob-tab.active{background:var(--accent-dim);border-bottom-color:var(--accent);color:var(--accent)}
.mob-tab.icon{font-size:16px}
.mob-content{padding:10px 14px 80px;max-width:500px;margin:0 auto}
.sec-head{text-align:center;padding:10px 0;border-bottom:2px solid var(--accent);margin-bottom:14px}
.sec-emoji{font-size:24px}.sec-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase}.sec-sub{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px}
.rd-label{font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;padding-left:4px;display:flex;align-items:baseline;gap:6px}
.rd-pts{font-weight:400;opacity:0.4;font-size:10px}
.rd-group{margin-bottom:16px}
.game-row{display:flex;gap:4px;margin-bottom:5px}
.pick{flex:1;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:rgba(255,255,255,0.65);font-size:12px;text-align:left;display:flex;align-items:center;gap:4px;transition:all 0.12s;position:relative}
.pick .sd{font-size:9px;opacity:0.4;min-width:14px}
.pick:hover:not(:disabled){background:var(--card-hover)}
.pick.sel{background:var(--accent-dim);border-color:color-mix(in srgb,var(--accent) 35%,transparent);color:var(--accent);font-weight:700}
.pick.win{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.35);color:var(--green);font-weight:700}
.pick.lose{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:var(--red);font-weight:700}
.pick.elim{opacity:0.3;text-decoration:line-through}
.pick .ck{margin-left:auto;font-size:10px}
.pick .sc{margin-left:auto;font-size:9px;opacity:0.5;font-weight:400}
.pick:disabled{cursor:default}
.champ-box{text-align:center;padding:14px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,transparent),color-mix(in srgb,var(--accent) 4%,transparent));border-radius:10px;border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);margin-top:10px}
.champ-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--font-display)}
.champ-name{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--accent);margin-top:4px}

/* TIEBREAKER */
.tb-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;text-align:center}
.tb-box .lbl{font-family:var(--font-display);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.tb-box input{width:80px;padding:8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:#fff;font-size:16px;text-align:center;outline:none;font-family:var(--font-display)}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;padding:10px 12px;margin-bottom:4px;background:var(--card);border-radius:8px;border-left:3px solid transparent;cursor:pointer;transition:all 0.15s}
.lb-row:hover{background:var(--card-hover)}.lb-row.first{background:color-mix(in srgb,var(--accent) 10%,transparent);border-left-color:var(--accent)}
.lb-rank{font-family:var(--font-display);font-size:18px;font-weight:700;width:28px;text-align:center}
.lb-info{flex:1;margin-left:6px}.lb-name{font-size:14px;font-weight:700}.lb-detail{font-size:10px;color:var(--muted);line-height:1.4}
.lb-score-col{text-align:right}
.lb-pts{font-family:var(--font-display);font-size:20px;font-weight:700}
.lb-max{font-size:9px;color:var(--muted)}

/* ADMIN */
.admin-btn{width:100%;padding:13px;border-radius:8px;border:none;color:#fff;font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:1px;margin-bottom:8px;transition:transform 0.1s}
.admin-btn:active{transform:scale(0.98)}
.admin-danger{background:linear-gradient(135deg,#7f1d1d,#991b1b)!important;font-size:12px!important}
.del-btn{background:none;border:none;color:var(--red);font-size:11px;padding:2px 6px;border-radius:4px;opacity:0.6;transition:opacity 0.15s}
.del-btn:hover{opacity:1;background:rgba(239,68,68,0.1)}

/* PROGRESS */
.progress-bar{height:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2,var(--accent)));transition:width 0.3s}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:340px;text-align:center}
.confirm-box h3{font-family:var(--font-display);font-size:18px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.4}
.confirm-box .btns{display:flex;gap:8px;justify-content:center}
.confirm-box .btn-cancel{padding:10px 24px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600}
.confirm-box .btn-confirm{padding:10px 24px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:600}

.desktop-bracket{display:none}
.footer{text-align:center;padding:14px;font-size:10px;color:rgba(255,255,255,0.12)}
.msg-bar{padding:8px 14px;background:var(--accent-dim);color:var(--accent);font-size:12px;text-align:center;font-weight:600}
.hidden{display:none}
.ff-label{font-size:10px;color:var(--muted);margin-bottom:3px}

/* DESKTOP */
@media(min-width:1100px){
.mobile-view{display:none!important}.desktop-bracket{display:block!important}
.bracket-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:8px 12px;max-width:1600px;margin:0 auto}
.bracket-side{display:flex;flex-direction:column;gap:20px}.bracket-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:200px;padding:0 10px}
.region-label{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-align:center;padding:6px 0;margin-bottom:4px}
.rounds{display:flex;align-items:stretch}.rounds.rtl{flex-direction:row-reverse}
.round-col{display:flex;flex-direction:column;justify-content:space-around;min-width:130px;padding:0 3px}
.round-col-header{font-family:var(--font-display);font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 0 4px}
.bracket-game{background:var(--card);border:1px solid var(--border);border-radius:4px;margin:2px 0;overflow:hidden;min-width:120px;font-size:11px}
.bracket-game .tr{display:flex;align-items:center;padding:3px 6px;cursor:pointer;transition:background 0.1s;gap:3px;border-bottom:1px solid rgba(255,255,255,0.04)}
.bracket-game .tr:last-child{border-bottom:none}
.bracket-game .tr:hover{background:rgba(255,255,255,0.04)}
.bracket-game .tr.picked{background:var(--accent-dim);color:var(--accent);font-weight:700}
.bracket-game .tr.correct{background:rgba(74,222,128,0.1);color:var(--green);font-weight:700}
.bracket-game .tr.incorrect{background:rgba(239,68,68,0.08);color:var(--red);font-weight:700}
.bracket-game .tr.elim{opacity:0.3;text-decoration:line-through}
.bracket-game .tr.locked{cursor:default}
.bracket-game .ts{font-size:9px;color:var(--muted);min-width:16px;text-align:right}
.bracket-game .tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bracket-game .tsc{font-size:9px;margin-left:auto;opacity:0.5}
.bracket-game .tc{font-size:9px;margin-left:auto}
.bracket-game .tr.tbd{color:var(--muted);cursor:default;font-style:italic}
.ff-center{text-align:center}.ff-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.ff-game{margin-bottom:10px}.ff-game-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.champion-display{margin-top:12px;padding:12px 16px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 15%,transparent),color-mix(in srgb,var(--accent) 5%,transparent));border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:8px}
.champion-display .label{font-family:var(--font-display);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.champion-display .name{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--accent);margin-top:2px}
.desk-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:4px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.desk-nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 16px;border-radius:6px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.desk-nav-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.desk-nav-btn.active{background:var(--accent-dim);border-color:color-mix(in srgb,var(--accent) 30%,transparent);color:var(--accent)}
}
</style>
</head>

// === ELIMINATED ===
function getEliminated(res){
  const e=new Set();
  for(const rk of RK){const rR=res[rk]||{};const reg=REGIONS[rk];
    const r0=rR[0]||{};for(let i=0;i<reg.games.length;i++){if(r0[i]){const[,t1,,t2]=reg.games[i];e.add(r0[i]===t1?t2:t1);}}
    for(let rd=1;rd<4;rd++){const rdR=rR[rd]||{},prev=rR[rd-1]||{};const cnt=8/Math.pow(2,rd);for(let g=0;g<cnt;g++){if(rdR[g]){const t1=prev[g*2],t2=prev[g*2+1];if(rdR[g]===t1&&t2)e.add(t2);if(rdR[g]===t2&&t1)e.add(t1);}}}
  }
  const ffR=res.finalFour||{};const rc=RK.map(r=>(res[r]||{})[3]?.[0]);
  if(ffR[0]){if(ffR[0][0]){if(ffR[0][0]===rc[0]&&rc[1])e.add(rc[1]);if(ffR[0][0]===rc[1]&&rc[0])e.add(rc[0]);}
    if(ffR[0][1]){if(ffR[0][1]===rc[2]&&rc[3])e.add(rc[3]);if(ffR[0][1]===rc[3]&&rc[2])e.add(rc[2]);}}
  if(ffR[1]&&ffR[1][0]){const s1=(ffR[0]||{})[0],s2=(ffR[0]||{})[1];if(ffR[1][0]===s1&&s2)e.add(s2);if(ffR[1][0]===s2&&s1)e.add(s1);}
  return e;
}

// === SCORING ===
function countPicks(p){let c=0;for(const rk of RK){const rp=p[rk]||{};for(let rd=0;rd<4;rd++)c+=Object.keys(rp[rd]||{}).length;}const ff=p.finalFour||{};for(let rd=0;rd<2;rd++)c+=Object.keys(ff[rd]||{}).length;return c;}

function scoreBreakdown(p,res){
  const earned=[0,0,0,0,0,0];const elim=getEliminated(res);
  for(const rk of RK){const rp=p[rk]||{},rr=res[rk]||{};for(let rd=0;rd<4;rd++){const rdp=rp[rd]||{},rdr=rr[rd]||{};for(const i in rdr){if(rdp[i]&&rdp[i]===rdr[i])earned[rd]+=PTS[rd];}}}
  const ffp=p.finalFour||{},ffr=res.finalFour||{};for(let rd=0;rd<2;rd++){const rdp=ffp[rd]||{},rdr=ffr[rd]||{};for(const i in rdr){if(rdp[i]&&rdp[i]===rdr[i])earned[rd+4]+=PTS[rd+4];}}
  const total=earned.reduce((a,b)=>a+b,0);
  let maxR=0;
  for(const rk of RK){const rp=p[rk]||{},rr=res[rk]||{};for(let rd=0;rd<4;rd++){const rdp=rp[rd]||{},rdr=rr[rd]||{};const cnt=8/Math.pow(2,rd);for(let g=0;g<cnt;g++){if(rdp[g]&&!rdr[g]&&!elim.has(rdp[g]))maxR+=PTS[rd];}}}
  for(let rd=0;rd<2;rd++){const rdp=(p.finalFour||{})[rd]||{},rdr=(res.finalFour||{})[rd]||{};for(const g in rdp){if(rdp[g]&&!rdr[g]&&!elim.has(rdp[g]))maxR+=PTS[rd+4];}}
  return{total,byRound:earned,maxRemaining:maxR,maxPossible:total+maxR};
}

function getGameScore(rg,rd,ix){const s=S.scores[rg];if(!s)return null;const r=s[rd];if(!r)return null;return r[ix]||null;}

// === CHAMPION COLOR ===
function applyChampColor(){
  const p=ap();const champ=(p.finalFour||{})[1]?.[0];
  if(champ&&TEAM_COLORS[champ]){
    const c=TEAM_COLORS[champ];
    document.documentElement.style.setProperty("--accent",c[0]);
    document.documentElement.style.setProperty("--accent2",c[1]);
    document.documentElement.style.setProperty("--accent-dim","color-mix(in srgb,"+c[0]+" 15%,transparent)");
  }else{
    document.documentElement.style.setProperty("--accent","#e8a838");
    document.documentElement.style.setProperty("--accent2","#FFFFFF");
    document.documentElement.style.setProperty("--accent-dim","rgba(232,168,56,0.15)");
  }
}

function setPick(rg,rd,ix,tm){if(S.locked||ro())return;if(!S.picks[rg])S.picks[rg]={};if(!S.picks[rg][rd])S.picks[rg][rd]={};if(S.picks[rg][rd][ix]===tm){delete S.picks[rg][rd][ix];render();clearTimeout(window._st);window._st=setTimeout(savePicks,500);return;}
  S.picks[rg][rd][ix]=tm;if(rg!=="finalFour"){for(let r=rd+1;r<4;r++){if(S.picks[rg][r]){const cl={},pv=S.picks[rg][r-1]||{},ct=8/Math.pow(2,r);for(let g=0;g<ct;g++){const t1=pv[g*2],t2=pv[g*2+1],ex=S.picks[rg][r][g];if(ex&&(ex===t1||ex===t2))cl[g]=ex;}S.picks[rg][r]=cl;}}}
  render();clearTimeout(window._st);window._st=setTimeout(savePicks,500);}

// === PICK BUTTON ===
function pickHTML(tm,sd,pk,rs,rg,rd,ix,elim){
  if(!tm)return'<button class="pick" disabled><span style="color:var(--muted)">TBD</span></button>';
  const cor=rs&&pk===rs&&pk===tm,inc=rs&&pk&&pk!==rs&&pk===tm,sel=pk===tm;
  const isElim=!cor&&!inc&&elim&&elim.has(tm);
  let c="pick";if(cor)c+=" win";else if(inc)c+=" lose";else if(sel&&isElim)c+=" sel elim";else if(sel)c+=" sel";
  const sdH=sd?'<span class="sd">('+sd+')</span>':"";
  // Score display
  const gs=getGameScore(rg,rd,ix);let scH="";
  if(gs){const myScore=gs.t1===tm?gs.t1score:gs.t2===tm?gs.t2score:null;if(myScore!=null)scH='<span class="sc">'+myScore+'</span>';}
  const ckH=cor?'<span class="ck">\u2713</span>':inc?'<span class="ck">\u2717</span>':(sel&&isElim?'<span class="ck">\u2717</span>':"");
  const dis=(S.locked||ro())?"disabled":"";
  return'<button class="'+c+'" '+dis+' onclick="setPick(\''+esc(rg)+'\','+rd+','+ix+',\''+esc(tm)+'\')">'+sdH+tm+scH+ckH+'</button>';
}

// === MOBILE REGION ===
function mobRegion(rk){
  const reg=REGIONS[rk],p=ap(),rP=p[rk]||{},rR=S.results[rk]||{};const elim=getEliminated(S.results);
  let h='<div class="sec-head" style="border-bottom-color:'+reg.color+'"><div class="sec-emoji">'+reg.emoji+'</div><div class="sec-title">'+reg.name+'</div>';
  const ch=rP[3]?.[0];if(ch){const ce=elim.has(ch);h+='<div class="sec-sub"'+(ce?' style="text-decoration:line-through;opacity:0.4"':"")+'>'+seed(ch)+' '+(S.viewing||"Your")+' pick: '+ch+'</div>';}
  h+='</div>';
  let cur=reg.games.map(g=>({s1:g[0],t1:g[1],s2:g[2],t2:g[3]}));
  for(let rd=0;rd<4;rd++){const rdP=rP[rd]||{},rdR=rR[rd]||{};
    h+='<div class="rd-group"><div class="rd-label" style="color:'+reg.color+'">'+RN[rd]+' <span class="rd-pts">'+PTS[rd]+' pts</span></div>';
    for(let i=0;i<cur.length;i++){const g=cur[i];
      const s1=seed(g.t1),s2=seed(g.t2);
      h+='<div class="game-row">'+pickHTML(g.t1,s1,rdP[i],rdR[i],rk,rd,i,elim)+pickHTML(g.t2,s2,rdP[i],rdR[i],rk,rd,i,elim)+'</div>';
    }h+='</div>';
    let nx=[];for(let i=0;i<cur.length;i+=2)nx.push({t1:rdP[i]||null,t2:rdP[i+1]||null});cur=nx;
  }return h;
}

  }

}

// === LEADERBOARD ===
async function renderBoard(tid){
  const all=await api("GET","/api/all-picks");const allTB=await api("GET","/api/all-tiebreakers");
  let sorted=S.players.map(p=>{const sb=scoreBreakdown(all[p]||{},S.results);return{name:p,score:sb.total,max:sb.maxPossible,picks:countPicks(all[p]||{}),champ:(all[p]?.finalFour||{})[1]?.[0]||"\u2014",tb:allTB[p]?.score||null};}).sort((a,b)=>b.score-a.score||b.max-a.max);
  let h='<div class="sec-head"><div class="sec-emoji">\u{1F4CA}</div><div class="sec-title">Leaderboard</div><div style="font-size:10px;color:var(--muted);margin-top:2px">R64=10 \u00b7 R32=20 \u00b7 S16=40 \u00b7 E8=80 \u00b7 F4=160 \u00b7 Champ=320</div></div>';
  h+='<div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px">\u{1F440} Tap a player to view their bracket</div>';
  if(!sorted.length)h+='<div style="text-align:center;color:var(--muted);padding:20px">No players yet</div>';
  const elim=getEliminated(S.results);
  sorted.forEach((p,i)=>{
    const isV=S.viewing===p.name,isMe=S.user===p.name;
    const champClr=p.champ!=="\u2014"&&TEAM_COLORS[p.champ]?TEAM_COLORS[p.champ][0]:"";
    const champElim=p.champ!=="\u2014"&&elim.has(p.champ);
    let ex=isV?' style="border-color:var(--blue);background:rgba(74,144,217,0.08)"':isMe?' style="border-color:color-mix(in srgb,var(--accent) 20%,transparent)"':"";
    h+='<div class="lb-row'+(i===0?" first":"")+'"'+ex+' onclick="viewUser(\''+esc(p.name)+'\')">';
    h+='<div class="lb-rank" style="color:'+(i===0?"var(--accent)":"var(--muted)")+'">'+String(i+1)+'</div>';
    h+='<div class="lb-info"><div class="lb-name">'+p.name+(isMe?" (you)":"")+(isV?" \u{1F440}":"")+'</div>';
    h+='<div class="lb-detail">'+p.picks+'/63 picks \u00b7 Champ: <span style="'+(champClr?"color:"+champClr+";":"")+(champElim?"text-decoration:line-through;opacity:0.5":"")+'">'+p.champ+'</span>'+(p.tb?" \u00b7 TB: "+p.tb:"")+'</div></div>';
    h+='<div class="lb-score-col"><div class="lb-pts" style="color:'+(i===0?"var(--accent)":"#fff")+'">'+p.score+'</div><div class="lb-max">max '+p.max+'</div></div></div>';
  });
  const el=document.getElementById(tid);if(el)el.innerHTML=h;
}

// === ADMIN ===
function mobAdmin(){
  if(!S.isAdmin)return'<div class="sec-head"><div class="sec-emoji">\u{1F510}</div><div class="sec-title">Admin</div></div><div style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--muted);margin-bottom:12px">Enter admin PIN</div><input id="api2" type="tel" maxlength="4" placeholder="PIN" style="width:140px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:#fff;font-size:18px;text-align:center;outline:none;letter-spacing:8px" onkeydown="if(event.key===\'Enter\')checkAdminPin()"><br><button class="gate-btn" style="margin-top:12px;padding:10px 32px;font-size:14px" onclick="checkAdminPin()">Unlock</button><div id="ape" class="gate-err"></div></div>';
  let h='<div class="sec-head"><div class="sec-emoji">\u2699\uFE0F</div><div class="sec-title">Admin</div></div>';
  h+='<button class="admin-btn" style="background:linear-gradient(135deg,#4a90d9,#2e6bb0)" onclick="doSync()">\u{1F504} Sync Scores from ESPN</button>';
  h+='<button class="admin-btn" style="background:'+(S.locked?"linear-gradient(135deg,#4ade80,#22c55e)":"linear-gradient(135deg,#ef4444,#dc2626)")+'" onclick="toggleLock()">'+(S.locked?"\u{1F513} Unlock Brackets":"\u{1F512} Lock All Brackets")+'</button>';
  h+='<button class="admin-btn admin-danger" onclick="showConfirm(\'Reset Results\',\'Clear all game results? Picks are kept.\',resetResults)">\u{1F5D1}\uFE0F Reset Results</button>';
  h+='<button class="admin-btn admin-danger" onclick="showConfirm(\'Nuclear Reset\',\'Wipe EVERYTHING?\',nuclearReset)">\u2622\uFE0F Nuclear Reset</button>';
  if(S.lastSync)h+='<div style="font-size:11px;color:var(--muted);text-align:center;margin:8px 0">Last sync: '+S.lastSync+'</div>';
  h+='<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Players ('+S.players.length+')</div>';
  S.players.forEach(p=>{h+='<div style="display:flex;align-items:center;padding:6px 10px;background:var(--card);border-radius:6px;margin-bottom:3px;font-size:12px;color:rgba(255,255,255,0.6)"><span style="flex:1">'+p+'</span><button class="del-btn" onclick="showConfirm(\'Delete\',\'Clear picks for '+esc(p)+'?\',()=>deletePlayer(\''+esc(p)+'\'))">\u2717</button></div>';});
  h+='</div>';
  // Manual results
  h+='<div style="margin-top:20px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Manual Results</div>';
  for(const rk of RK){const reg=REGIONS[rk],rR=S.results[rk]||{};let cur=reg.games.map(g=>({t1:g[1],t2:g[3]}));let shown=false;for(let rd=0;rd<4;rd++){const rdR=rR[rd]||{};for(let i=0;i<cur.length;i++){const g=cur[i];if(!g.t1||!g.t2)continue;if(!rdR[i]&&!shown){h+='<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center"><span style="font-size:10px;color:'+reg.color+';width:48px;font-weight:700;font-family:var(--font-display)">'+reg.name+'</span><button class="pick" style="flex:1;font-size:11px;padding:5px" onclick="manualResult(\''+rk+'\','+rd+','+i+',\''+esc(g.t1)+'\')">'+g.t1+'</button><button class="pick" style="flex:1;font-size:11px;padding:5px" onclick="manualResult(\''+rk+'\','+rd+','+i+',\''+esc(g.t2)+'\')">'+g.t2+'</button></div>';shown=true;}}let nx=[];for(let i=0;i<cur.length;i+=2)nx.push({t1:rdR[i]||null,t2:rdR[i+1]||null});cur=nx;}}
  h+='</div>';return h;
}

// === DESKTOP TEAM ROW ===
function dtr(tm,pk,rs,rg,rd,ix,elim){
  if(!tm)return'<div class="tr tbd"><span class="tn">TBD</span></div>';
  const sd=seed(tm);const cor=rs&&pk===rs&&pk===tm,inc=rs&&pk&&pk!==rs&&pk===tm,sel=pk===tm;
  const isElim=!cor&&!inc&&elim&&elim.has(tm);
  let c="tr";if(cor)c+=" correct";else if(inc)c+=" incorrect";else if(sel&&isElim)c+=" picked elim";else if(sel)c+=" picked";
  if(S.locked||ro())c+=" locked";
  const gs=getGameScore(rg,rd,ix);let scH="";
  if(gs){const my=gs.t1===tm?gs.t1score:gs.t2===tm?gs.t2score:null;if(my!=null)scH='<span class="tsc">'+my+'</span>';}
  const ckH=cor?"<span class='tc'>\u2713</span>":inc?"<span class='tc'>\u2717</span>":(sel&&isElim?"<span class='tc'>\u2717</span>":"");
  const cl=(S.locked||ro())?"":'onclick="setPick(\''+esc(rg)+'\','+rd+','+ix+',\''+esc(tm)+'\')"';
  return'<div class="'+c+'" '+cl+'>'+(sd?'<span class="ts">'+sd+'</span>':'')+'<span class="tn">'+tm+'</span>'+scH+ckH+'</div>';
}

function deskRegion(rk,rtl){
  const reg=REGIONS[rk],p=ap(),rP=p[rk]||{},rR=S.results[rk]||{};const elim=getEliminated(S.results);
  let rounds=[];let cur=reg.games.map(g=>({s1:g[0],t1:g[1],s2:g[2],t2:g[3]}));
  for(let rd=0;rd<4;rd++){const rdP=rP[rd]||{},rdR=rR[rd]||{};let gm="";
    for(let i=0;i<cur.length;i++){const g=cur[i];gm+='<div class="bracket-game">'+dtr(g.t1,rdP[i],rdR[i],rk,rd,i,elim)+dtr(g.t2,rdP[i],rdR[i],rk,rd,i,elim)+'</div>';}
    rounds.push('<div class="round-col"><div class="round-col-header">'+RN_SHORT[rd]+' \u00b7 '+PTS[rd]+'pts</div>'+gm+'</div>');
    let nx=[];for(let i=0;i<cur.length;i+=2)nx.push({t1:rdP[i]||null,t2:rdP[i+1]||null});cur=nx;
  }
  return'<div class="region-bracket"><div class="region-label" style="color:'+reg.color+'">'+reg.emoji+' '+reg.name+'</div><div class="rounds'+(rtl?" rtl":"")+'">'+rounds.join("")+'</div></div>';
}

function deskFF(){
  const p=ap(),elim=getEliminated(S.results),ch=RK.map(r=>(p[r]||{})[3]?.[0]||null),ffP=p.finalFour||{},ffR=S.results.finalFour||{};
  const s1P=(ffP[0]||{})[0],s2P=(ffP[0]||{})[1],cP=(ffP[1]||{})[0];
  const s1R=(ffR[0]||{})[0],s2R=(ffR[0]||{})[1],cR=(ffR[1]||{})[0];
  let h='<div class="ff-center"><div class="ff-title">\u{1F3C6} Final Four</div>';
  h+='<div class="ff-game"><div class="ff-game-label">East vs South \u00b7 160pts</div><div class="bracket-game">'+dtr(ch[0],s1P,s1R,"finalFour",0,0,elim)+dtr(ch[1],s1P,s1R,"finalFour",0,0,elim)+'</div></div>';
  h+='<div class="ff-game"><div class="ff-game-label">Championship \u00b7 320pts</div><div class="bracket-game">'+dtr(s1P,cP,cR,"finalFour",1,0,elim)+dtr(s2P,cP,cR,"finalFour",1,0,elim)+'</div></div>';
  h+='<div class="ff-game"><div class="ff-game-label">West vs Midwest \u00b7 160pts</div><div class="bracket-game">'+dtr(ch[2],s2P,s2R,"finalFour",0,1,elim)+dtr(ch[3],s2P,s2R,"finalFour",0,1,elim)+'</div></div>';
  if(cP)h+='<div class="champion-display"><div class="label">'+(S.viewing||"Your")+' Champion</div><div class="name">\u{1F3C6} '+seed(cP)+' '+cP+'</div></div>';
  h+='</div>';return h;
}

// === RENDER ===
function render(){
  applyChampColor();
  // PIN
  if(S.screen==="pin"){document.getElementById("app").innerHTML='<div class="gate"><div class="gate-emoji">\u{1F3C0}</div><div class="gate-sub">2026 NCAA Tournament</div><div class="gate-title">BEAUBOUEF BRACKET</div><input id="pi" type="tel" inputmode="numeric" maxlength="4" placeholder="Enter PIN" style="letter-spacing:8px;font-size:20px" onkeydown="if(event.key===\'Enter\')checkPin()" autofocus><button class="gate-btn" onclick="checkPin()">Enter</button><div id="pe" class="gate-err"></div></div>';return;}
  // LOGIN
  if(S.screen==="login"){let pb="";if(S.players.length){pb='<div class="player-list">';S.players.forEach(p=>{pb+='<button class="player-btn" onclick="loginExisting(\''+esc(p)+'\')">'+p+'<span class="arrow">\u2192</span></button>';});pb+='</div>';}document.getElementById("app").innerHTML='<div class="gate"><div class="gate-emoji">\u{1F3C0}</div><div class="gate-sub">Welcome</div><div class="gate-title">WHO ARE YOU?</div>'+(S.players.length?'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Returning? Tap your name:</div>'+pb+'<div class="gate-divider">or new player</div>':'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Enter your name to get started</div>')+'<input id="fn" placeholder="First name" autocapitalize="words"><input id="ln" placeholder="Last name" autocapitalize="words" onkeydown="if(event.key===\'Enter\')loginNew()"><button class="gate-btn" onclick="loginNew()">Join</button><div id="le" class="gate-err"></div></div>';return;}
  // APP
  const cnt=countPicks(ap()),pct=Math.round(cnt/63*100);
  const tabs=["east","south","west","midwest","f4","board","admin"],labels={east:"E",south:"S",west:"W",midwest:"MW",f4:"\u{1F3C6}",board:"\u{1F4CA}",admin:"\u2699\uFE0F"};
  const dtabs=["bracket","board","admin"],dlabels={bracket:"Bracket",board:"Leaderboard",admin:"Admin"};
  let mt=tabs.map(t=>'<button class="mob-tab'+(t===S.tab?" active":"")+(["f4","board","admin"].includes(t)?" icon":"")+'" onclick="S.tab=\''+t+'\';render()">'+labels[t]+'</button>').join("");
  let dn=dtabs.map(t=>'<button class="desk-nav-btn'+(t===S.deskTab?" active":"")+'" onclick="S.deskTab=\''+t+'\';render()">'+dlabels[t]+'</button>').join("");
  let badges="";if(S.locked)badges+='<span class="topbar-badge badge-locked">Locked</span>';if(S.saving)badges+='<span class="topbar-badge badge-saving">Saving</span>';if(S.viewing)badges+='<span class="topbar-badge badge-viewing">\u{1F440} '+S.viewing.split(" ")[0]+'</span>';
  let mc="";if(RK.includes(S.tab))mc=mobRegion(S.tab);else if(S.tab==="f4")mc=mobFF();else if(S.tab==="admin")mc=mobAdmin();else if(S.tab==="board")mc='<div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div>';
  let dc="";if(S.deskTab==="bracket")dc='<div class="bracket-wrap"><div class="bracket-side">'+deskRegion("east",false)+deskRegion("south",false)+'</div><div class="bracket-center">'+deskFF()+'</div><div class="bracket-side">'+deskRegion("west",true)+deskRegion("midwest",true)+'</div></div>';else if(S.deskTab==="admin")dc='<div style="max-width:500px;margin:20px auto;padding:0 16px">'+mobAdmin()+'</div>';else if(S.deskTab==="board")dc='<div id="db" style="max-width:500px;margin:20px auto;padding:0 16px"><div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div></div>';
  document.getElementById("app").innerHTML='<div class="topbar"><div><div class="topbar-brand">Beaubouef Bracket \'26</div><div class="topbar-user">'+S.user+'</div></div><div class="topbar-right">'+badges+'<button class="btn-sm" onclick="switchUser()">Switch</button></div></div>'+(S.msg?'<div class="msg-bar">'+S.msg+'</div>':"")+scoreStripHTML()+viewChipsHTML()+'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="mobile-view"><div class="mob-tabs">'+mt+'</div><div class="mob-content" id="tc">'+mc+'</div></div><div class="desktop-bracket"><div class="desk-nav">'+dn+'<button class="desk-nav-btn" onclick="doSync()" style="margin-left:20px">\u{1F504} ESPN</button></div>'+dc+'</div><div class="footer">'+cnt+'/63 picks ('+pct+'%)'+(S.viewing?" \u2014 "+S.viewing:"")+'</div>';
  if(S.tab==="board")renderBoard("tc");if(S.deskTab==="board")renderBoard("db");
}
init();

</script>
