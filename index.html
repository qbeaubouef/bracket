<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Beaubouef Bracket 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e14;--surface:#12171f;--card:#1a2030;--card-hover:#1f2738;--gold:#e8a838;--gold-dim:rgba(232,168,56,0.15);--green:#4ade80;--red:#ef4444;--blue:#4a90d9;--text:#e6e6e6;--muted:rgba(255,255,255,0.35);--border:rgba(255,255,255,0.08);--font-display:'Oswald',sans-serif;--font-body:'Source Sans 3',-apple-system,sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
::selection{background:var(--gold);color:#000}
.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;background:radial-gradient(ellipse at 50% 30%,rgba(232,168,56,0.06) 0%,transparent 60%)}
.gate-emoji{font-size:56px;margin-bottom:8px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.gate-sub{font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.gate-title{font-family:var(--font-display);font-size:32px;font-weight:700;margin:4px 0 28px;letter-spacing:2px}
.gate input{width:100%;max-width:300px;padding:14px 18px;border-radius:10px;border:1px solid rgba(232,168,56,0.25);background:rgba(255,255,255,0.04);color:#fff;font-size:16px;text-align:center;outline:none;transition:border-color 0.2s;margin-bottom:10px}
.gate input:focus{border-color:var(--gold)}
.gate-btn{margin-top:6px;padding:13px 48px;border-radius:8px;border:none;background:var(--gold);color:#000;font-family:var(--font-display);font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:transform 0.1s}
.gate-btn:active{transform:scale(0.97)}
.gate-err{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}
.gate-divider{display:flex;align-items:center;gap:12px;width:100%;max-width:300px;margin:18px 0;color:var(--muted);font-size:11px}
.gate-divider::before,.gate-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.player-list{margin-top:12px;width:100%;max-width:300px}
.player-btn{width:100%;padding:12px 16px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:600;text-align:left;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between}
.player-btn:hover{background:var(--card-hover);border-color:rgba(232,168,56,0.3)}
.player-btn .arrow{color:var(--muted);font-size:12px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar-brand{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.topbar-user{font-size:13px;font-weight:600;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-locked{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-saving{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-viewing{background:rgba(74,144,217,0.15);color:var(--blue)}
.btn-sm{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:11px;transition:all 0.15s}
.btn-sm:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.view-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.view-bar select{background:var(--card);border:1px solid var(--border);color:var(--gold);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;outline:none;cursor:pointer}
.view-bar select option{background:#1a2030;color:#fff}
.view-bar label{color:var(--muted);font-size:11px}
.mob-tabs{display:flex;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border)}
.mob-tab{flex:1;padding:10px 2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:1px;transition:all 0.15s}
.mob-tab.active{background:var(--gold-dim);border-bottom-color:var(--gold);color:var(--gold)}
.mob-tab.icon{font-size:16px}
.mob-content{padding:10px 14px 80px;max-width:500px;margin:0 auto}
.sec-head{text-align:center;padding:10px 0;border-bottom:2px solid var(--gold);margin-bottom:14px}
.sec-emoji{font-size:24px}.sec-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase}.sec-sub{font-size:12px;color:var(--gold);font-weight:600;margin-top:2px}
.rd-label{font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;padding-left:4px}
.rd-group{margin-bottom:16px}
.game-row{display:flex;gap:4px;margin-bottom:5px}
.pick{flex:1;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:rgba(255,255,255,0.65);font-size:12px;text-align:left;display:flex;align-items:center;gap:4px;transition:all 0.12s}
.pick .seed{font-size:9px;opacity:0.4;min-width:14px}
.pick:hover:not(:disabled){background:var(--card-hover)}
.pick.sel{background:var(--gold-dim);border-color:rgba(232,168,56,0.35);color:var(--gold);font-weight:700}
.pick.win{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.35);color:var(--green);font-weight:700}
.pick.lose{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:var(--red);font-weight:700}
.pick .ck{margin-left:auto;font-size:10px}
.pick:disabled{opacity:0.5;cursor:default}
.champ-box{text-align:center;padding:14px;background:linear-gradient(135deg,rgba(232,168,56,0.12),rgba(232,168,56,0.04));border-radius:10px;border:1px solid rgba(232,168,56,0.25);margin-top:10px}
.champ-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--font-display)}
.champ-name{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--gold);margin-top:4px}
.lb-row{display:flex;align-items:center;padding:10px 12px;margin-bottom:4px;background:var(--card);border-radius:8px;border-left:3px solid transparent;cursor:pointer;transition:all 0.15s}
.lb-row:hover{background:var(--card-hover)}.lb-row.first{background:rgba(232,168,56,0.1);border-left-color:var(--gold)}
.lb-rank{font-family:var(--font-display);font-size:18px;font-weight:700;width:30px;text-align:center}
.lb-info{flex:1;margin-left:4px}.lb-name{font-size:14px;font-weight:700}.lb-detail{font-size:11px;color:var(--muted)}
.lb-score{font-family:var(--font-display);font-size:20px;font-weight:700}
.admin-btn{width:100%;padding:13px;border-radius:8px;border:none;color:#fff;font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:1px;margin-bottom:8px;transition:transform 0.1s}
.admin-btn:active{transform:scale(0.98)}
.desktop-bracket{display:none}.footer{text-align:center;padding:14px;font-size:10px;color:rgba(255,255,255,0.12)}
.msg-bar{padding:8px 14px;background:var(--gold-dim);color:var(--gold);font-size:12px;text-align:center;font-weight:600}
.hidden{display:none}.ff-label{font-size:10px;color:var(--muted);margin-bottom:3px}
@media(min-width:1100px){
.mobile-view{display:none!important}.desktop-bracket{display:block!important}
.bracket-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:8px 12px;max-width:1600px;margin:0 auto}
.bracket-side{display:flex;flex-direction:column;gap:20px}.bracket-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:200px;padding:0 10px}
.region-label{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-align:center;padding:6px 0;margin-bottom:4px}
.rounds{display:flex;align-items:stretch}.rounds.rtl{flex-direction:row-reverse}
.round-col{display:flex;flex-direction:column;justify-content:space-around;min-width:130px;padding:0 3px}
.round-col-header{font-family:var(--font-display);font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 0 4px}
.bracket-game{background:var(--card);border:1px solid var(--border);border-radius:4px;margin:2px 0;overflow:hidden;min-width:120px;font-size:11px}
.bracket-game .team-row{display:flex;align-items:center;padding:3px 6px;cursor:pointer;transition:background 0.1s;gap:3px;border-bottom:1px solid rgba(255,255,255,0.04)}
.bracket-game .team-row:last-child{border-bottom:none}
.bracket-game .team-row:hover{background:rgba(255,255,255,0.04)}
.bracket-game .team-row.picked{background:var(--gold-dim);color:var(--gold);font-weight:700}
.bracket-game .team-row.correct{background:rgba(74,222,128,0.1);color:var(--green);font-weight:700}
.bracket-game .team-row.incorrect{background:rgba(239,68,68,0.08);color:var(--red);font-weight:700}
.bracket-game .team-row.locked{cursor:default}
.bracket-game .team-seed{font-size:9px;color:var(--muted);min-width:16px;text-align:right}
.bracket-game .team-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bracket-game .team-check{font-size:9px;margin-left:auto}
.bracket-game .team-row.tbd{color:var(--muted);cursor:default;font-style:italic}
.ff-center{text-align:center}.ff-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.ff-game{margin-bottom:10px}.ff-game-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.champion-display{margin-top:12px;padding:12px 16px;background:linear-gradient(135deg,rgba(232,168,56,0.15),rgba(232,168,56,0.05));border:1px solid rgba(232,168,56,0.25);border-radius:8px}
.champion-display .label{font-family:var(--font-display);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.champion-display .name{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--gold);margin-top:2px}
.desk-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:4px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.desk-nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 16px;border-radius:6px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.desk-nav-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.desk-nav-btn.active{background:var(--gold-dim);border-color:rgba(232,168,56,0.3);color:var(--gold)}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const ENTRY_PIN="4406",ADMIN_PIN="5502";
const REGIONS={east:{name:"East",emoji:"🏛️",color:"#4a90d9",games:[[1,"Duke",16,"Siena"],[8,"Ohio State",9,"TCU"],[5,"St. John's",12,"Northern Iowa"],[4,"Kansas",13,"Cal Baptist"],[6,"Louisville",11,"South Florida"],[3,"Michigan State",14,"North Dakota St."],[7,"UCLA",10,"UCF"],[2,"UConn",15,"Furman"]]},south:{name:"South",emoji:"🌴",color:"#c0392b",games:[[1,"Florida",16,"PV A&M/Lehigh"],[8,"Clemson",9,"Iowa"],[5,"Vanderbilt",12,"McNeese"],[4,"Nebraska",13,"Troy"],[6,"North Carolina",11,"VCU"],[3,"Illinois",14,"Penn"],[7,"Saint Mary's",10,"Texas A&M"],[2,"Houston",15,"Idaho"]]},west:{name:"West",emoji:"🌵",color:"#cc0033",games:[[1,"Arizona",16,"LIU"],[8,"Villanova",9,"Utah State"],[5,"Wisconsin",12,"High Point"],[4,"Arkansas",13,"Hawaii"],[6,"BYU",11,"Texas/NC State"],[3,"Gonzaga",14,"Kennesaw State"],[7,"Miami FL",10,"Missouri"],[2,"Purdue",15,"Queens"]]},midwest:{name:"Midwest",emoji:"🏭",color:"#f0c040",games:[[1,"Michigan",16,"UMBC/Howard"],[8,"Georgia",9,"Saint Louis"],[5,"Texas Tech",12,"Akron"],[4,"Alabama",13,"Hofstra"],[6,"Tennessee",11,"Miami OH/SMU"],[3,"Virginia",14,"Wright State"],[7,"Kentucky",10,"Santa Clara"],[2,"Iowa State",15,"Tennessee State"]]}};
const RK=["east","south","west","midwest"],RN=["Round of 64","Round of 32","Sweet 16","Elite 8"],RN_SHORT=["R64","R32","S16","E8"],RNAMES={east:"East",south:"South",west:"West",midwest:"Midwest"},PTS=[10,20,40,80,160,320];
let S={screen:"pin",user:null,viewing:null,viewPicks:{},picks:{},results:{},players:[],locked:false,isAdmin:false,tab:"east",deskTab:"bracket",saving:false,msg:"",lastSync:null};
const api=async(m,u,b)=>{const o={method:m,headers:{"Content-Type":"application/json"}};if(b)o.body=JSON.stringify(b);return(await fetch(u,o)).json()};

async function init(){S.players=await api("GET","/api/players");S.results=await api("GET","/api/results");const s=await api("GET","/api/state");S.locked=s.locked||false;if(sessionStorage.getItem("bp")==="1")S.screen="login";if(sessionStorage.getItem("ba")==="1")S.isAdmin=true;const su=sessionStorage.getItem("bu");if(su&&S.players.includes(su)){S.user=su;S.picks=await api("GET","/api/picks/"+encodeURIComponent(su));S.screen="app";}render();setInterval(async()=>{try{const r=await api("GET","/api/results");if(JSON.stringify(r)!==JSON.stringify(S.results)){S.results=r;render();}}catch{}},30000);}
function checkPin(){const v=document.getElementById("pi").value;if(v===ENTRY_PIN){sessionStorage.setItem("bp","1");S.screen="login";render();}else{document.getElementById("pe").textContent="Wrong PIN.";}}
function checkAdminPin(){const v=document.getElementById("api2").value;if(v===ADMIN_PIN){sessionStorage.setItem("ba","1");S.isAdmin=true;S.msg="Admin unlocked.";render();setTimeout(()=>{S.msg="";render();},2000);}else{document.getElementById("ape").textContent="Wrong PIN.";}}
async function loginExisting(n){S.user=n;S.picks=await api("GET","/api/picks/"+encodeURIComponent(n));sessionStorage.setItem("bu",n);S.screen="app";S.viewing=null;render();}
async function loginNew(){const f=document.getElementById("fn").value.trim(),l=document.getElementById("ln").value.trim();if(!f||!l){document.getElementById("le").textContent="Enter first and last name.";return;}const n=f+" "+l;S.user=n;S.players=await api("POST","/api/players",{name:n});S.picks=await api("GET","/api/picks/"+encodeURIComponent(n));sessionStorage.setItem("bu",n);S.screen="app";S.viewing=null;render();}
function switchUser(){S.user=null;S.viewing=null;S.picks={};sessionStorage.removeItem("bu");S.screen="login";render();}
async function viewUser(n){if(n===S.user||!n){S.viewing=null;S.viewPicks={};render();return;}S.viewing=n;S.viewPicks=await api("GET","/api/picks/"+encodeURIComponent(n));render();}
function ap(){return S.viewing?S.viewPicks:S.picks;}
function ro(){return!!S.viewing;}
async function savePicks(){S.saving=true;render();await api("POST","/api/picks/"+encodeURIComponent(S.user),S.picks);S.saving=false;render();}
function setPick(rg,rd,ix,tm){if(S.locked||ro())return;if(!S.picks[rg])S.picks[rg]={};if(!S.picks[rg][rd])S.picks[rg][rd]={};S.picks[rg][rd][ix]=tm;if(rg!=="finalFour"){for(let r=rd+1;r<4;r++){if(S.picks[rg][r]){const cl={},pv=S.picks[rg][r-1]||{},ct=8/Math.pow(2,r);for(let g=0;g<ct;g++){const t1=pv[g*2],t2=pv[g*2+1],ex=S.picks[rg][r][g];if(ex&&(ex===t1||ex===t2))cl[g]=ex;}S.picks[rg][r]=cl;}}}render();clearTimeout(window._st);window._st=setTimeout(savePicks,500);}
async function doSync(){S.msg="Syncing with ESPN...";render();try{const r=await api("GET","/api/sync");S.results=await api("GET","/api/results");S.msg=r.updated?"Results updated!":"No new results.";S.lastSync=new Date().toLocaleTimeString();}catch(e){S.msg="Sync error.";}render();setTimeout(()=>{S.msg="";render();},4000);}
async function toggleLock(){S.locked=!S.locked;await api("POST","/api/state",{locked:S.locked});render();}
async function manualResult(rg,rd,ix,tm){if(!S.results[rg])S.results[rg]={};if(!S.results[rg][rd])S.results[rg][rd]={};S.results[rg][rd][ix]=tm;await api("POST","/api/results",S.results);render();}
function countPicks(p){let c=0;for(const rk of RK){const rp=p[rk]||{};for(let rd=0;rd<4;rd++)c+=Object.keys(rp[rd]||{}).length;}const ff=p.finalFour||{};for(let rd=0;rd<2;rd++)c+=Object.keys(ff[rd]||{}).length;return c;}
function calcScore(p,res){let s=0;for(const rk of RK){const rp=p[rk]||{},rr=res[rk]||{};for(let rd=0;rd<4;rd++){const rdp=rp[rd]||{},rdr=rr[rd]||{};for(const i in rdr){if(rdp[i]&&rdp[i]===rdr[i])s+=PTS[rd];}}}const ffp=p.finalFour||{},ffr=res.finalFour||{};for(let rd=0;rd<2;rd++){const rdp=ffp[rd]||{},rdr=ffr[rd]||{};for(const i in rdr){if(rdp[i]&&rdp[i]===rdr[i])s+=PTS[rd+4];}}return s;}
function esc(s){return s.replace(/'/g,"\\'");}

function pickHTML(tm,sd,pk,rs,rg,rd,ix){if(!tm)return'<button class="pick" disabled><span style="color:var(--muted)">TBD</span></button>';const cor=rs&&pk===rs&&pk===tm,inc=rs&&pk&&pk!==rs&&pk===tm,sel=pk===tm;let c="pick";if(cor)c+=" win";else if(inc)c+=" lose";else if(sel)c+=" sel";const sdH=sd?'<span class="seed">('+sd+')</span>':"";const ckH=cor?'<span class="ck">✓</span>':inc?'<span class="ck">✗</span>':"";const dis=(S.locked||ro())?"disabled":"";return'<button class="'+c+'" '+dis+' onclick="setPick(\''+esc(rg)+'\','+rd+','+ix+',\''+esc(tm)+'\')">'+sdH+tm+ckH+'</button>';}

function mobRegion(rk){const reg=REGIONS[rk],p=ap(),rP=p[rk]||{},rR=S.results[rk]||{};let h='<div class="sec-head" style="border-bottom-color:'+reg.color+'"><div class="sec-emoji">'+reg.emoji+'</div><div class="sec-title">'+reg.name+'</div>';const ch=rP[3]?.[0];if(ch)h+='<div class="sec-sub">'+(S.viewing||"Your")+' pick: '+ch+'</div>';h+='</div>';let cur=reg.games.map(g=>({s1:g[0],t1:g[1],s2:g[2],t2:g[3]}));for(let rd=0;rd<4;rd++){const rdP=rP[rd]||{},rdR=rR[rd]||{};h+='<div class="rd-group"><div class="rd-label" style="color:'+reg.color+'">'+RN[rd]+'</div>';for(let i=0;i<cur.length;i++){const g=cur[i];h+='<div class="game-row">'+pickHTML(g.t1,rd===0?g.s1:null,rdP[i],rdR[i],rk,rd,i)+pickHTML(g.t2,rd===0?g.s2:null,rdP[i],rdR[i],rk,rd,i)+'</div>';}h+='</div>';let nx=[];for(let i=0;i<cur.length;i+=2)nx.push({t1:rdP[i]||null,t2:rdP[i+1]||null});cur=nx;}return h;}

function mobFF(){const p=ap(),ch=RK.map(r=>(p[r]||{})[3]?.[0]||null),ffP=p.finalFour||{},ffR=S.results.finalFour||{};const s1P=(ffP[0]||{})[0],s2P=(ffP[0]||{})[1],cP=(ffP[1]||{})[0],s1R=(ffR[0]||{})[0],s2R=(ffR[0]||{})[1],cR=(ffR[1]||{})[0];let h='<div class="sec-head"><div class="sec-emoji">🏆</div><div class="sec-title">Final Four</div></div><div class="rd-group"><div class="rd-label" style="color:var(--gold)">Semifinals</div><div class="ff-label">'+RNAMES.east+' vs '+RNAMES.south+'</div><div class="game-row">'+pickHTML(ch[0],null,s1P,s1R,"finalFour",0,0)+pickHTML(ch[1],null,s1P,s1R,"finalFour",0,0)+'</div><div class="ff-label">'+RNAMES.west+' vs '+RNAMES.midwest+'</div><div class="game-row">'+pickHTML(ch[2],null,s2P,s2R,"finalFour",0,1)+pickHTML(ch[3],null,s2P,s2R,"finalFour",0,1)+'</div></div><div class="rd-group"><div class="rd-label" style="color:var(--gold)">Championship</div><div class="game-row">'+pickHTML(s1P,null,cP,cR,"finalFour",1,0)+pickHTML(s2P,null,cP,cR,"finalFour",1,0)+'</div></div>';if(cP)h+='<div class="champ-box"><div class="champ-label">'+(S.viewing||"Your")+' Champion</div><div class="champ-name">🏆 '+cP+' 🏆</div></div>';return h;}

async function renderBoard(tid){const all=await api("GET","/api/all-picks");let sorted=S.players.map(p=>({name:p,score:calcScore(all[p]||{},S.results),picks:countPicks(all[p]||{}),champ:(all[p]?.finalFour||{})[1]?.[0]||"—"})).sort((a,b)=>b.score-a.score||b.picks-a.picks);let h='<div class="sec-head"><div class="sec-emoji">📊</div><div class="sec-title">Leaderboard</div><div style="font-size:10px;color:var(--muted);margin-top:2px">R64=10 · R32=20 · S16=40 · E8=80 · F4=160 · Champ=320</div></div><div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px">Tap a player to view their bracket</div>';if(!sorted.length)h+='<div style="text-align:center;color:var(--muted);padding:20px">No players yet</div>';sorted.forEach((p,i)=>{const isV=S.viewing===p.name,isM=S.user===p.name;let ex=isV?' style="border-color:var(--blue);background:rgba(74,144,217,0.08)"':isM?' style="border-color:rgba(232,168,56,0.2)"':"";h+='<div class="lb-row'+(i===0?" first":"")+'"'+ex+' onclick="viewUser(\''+esc(p.name)+'\')"><div class="lb-rank" style="color:'+(i===0?"var(--gold)":"var(--muted)")+'">'+String(i+1)+'</div><div class="lb-info"><div class="lb-name">'+p.name+(isM?" (you)":"")+(isV?" 👀":"")+'</div><div class="lb-detail">'+p.picks+'/63 picks · Champ: '+p.champ+'</div></div><div class="lb-score" style="color:'+(i===0?"var(--gold)":"#fff")+'">'+p.score+'</div></div>';});const el=document.getElementById(tid);if(el)el.innerHTML=h;}

function mobAdmin(){if(!S.isAdmin)return'<div class="sec-head"><div class="sec-emoji">🔐</div><div class="sec-title">Admin</div></div><div style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--muted);margin-bottom:12px">Enter admin PIN</div><input id="api2" type="tel" maxlength="4" placeholder="PIN" style="width:140px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:#fff;font-size:18px;text-align:center;outline:none;letter-spacing:8px" onkeydown="if(event.key===\'Enter\')checkAdminPin()"><br><button class="gate-btn" style="margin-top:12px;padding:10px 32px;font-size:14px" onclick="checkAdminPin()">Unlock</button><div id="ape" class="gate-err"></div></div>';let h='<div class="sec-head"><div class="sec-emoji">⚙️</div><div class="sec-title">Admin</div></div><button class="admin-btn" style="background:linear-gradient(135deg,#4a90d9,#2e6bb0)" onclick="doSync()">🔄 Sync Scores from ESPN</button><button class="admin-btn" style="background:'+(S.locked?"linear-gradient(135deg,#4ade80,#22c55e)":"linear-gradient(135deg,#ef4444,#dc2626)")+'" onclick="toggleLock()">'+(S.locked?"🔓 Unlock Brackets":"🔒 Lock All Brackets")+'</button>';if(S.lastSync)h+='<div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">Last sync: '+S.lastSync+'</div>';h+='<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Players ('+S.players.length+')</div>';S.players.forEach(p=>{h+='<div style="padding:6px 10px;background:var(--card);border-radius:6px;margin-bottom:3px;font-size:12px;color:rgba(255,255,255,0.6)">'+p+'</div>';});h+='</div><div style="margin-top:20px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Manual Results</div><div style="font-size:11px;color:var(--muted);margin-bottom:8px">Tap the winner. Or use ESPN Sync.</div>';for(const rk of RK){const reg=REGIONS[rk],rR=S.results[rk]||{};let cur=reg.games.map(g=>({t1:g[1],t2:g[3]}));let shown=false;for(let rd=0;rd<4;rd++){const rdR=rR[rd]||{};for(let i=0;i<cur.length;i++){const g=cur[i];if(!g.t1||!g.t2)continue;if(!rdR[i]&&!shown){h+='<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center"><span style="font-size:10px;color:'+reg.color+';width:50px;font-weight:700;font-family:var(--font-display)">'+reg.name+'</span><button class="pick" style="flex:1;font-size:11px;padding:5px" onclick="manualResult(\''+rk+'\','+rd+','+i+',\''+esc(g.t1)+'\')">'+g.t1+'</button><button class="pick" style="flex:1;font-size:11px;padding:5px" onclick="manualResult(\''+rk+'\','+rd+','+i+',\''+esc(g.t2)+'\')">'+g.t2+'</button></div>';shown=true;}}let nx=[];for(let i=0;i<cur.length;i+=2)nx.push({t1:rdR[i]||null,t2:rdR[i+1]||null});cur=nx;}}h+='</div>';return h;}

function dtr(tm,sd,pk,rs,rg,rd,ix){if(!tm)return'<div class="team-row tbd"><span class="team-name">TBD</span></div>';const cor=rs&&pk===rs&&pk===tm,inc=rs&&pk&&pk!==rs&&pk===tm,sel=pk===tm;let c="team-row";if(cor)c+=" correct";else if(inc)c+=" incorrect";else if(sel)c+=" picked";if(S.locked||ro())c+=" locked";const sdH=sd?'<span class="team-seed">'+sd+'</span>':"";const ckH=cor?"<span class='team-check'>✓</span>":inc?"<span class='team-check'>✗</span>":"";const cl=(S.locked||ro())?"":'onclick="setPick(\''+esc(rg)+'\','+rd+','+ix+',\''+esc(tm)+'\')"';return'<div class="'+c+'" '+cl+'>'+sdH+'<span class="team-name">'+tm+'</span>'+ckH+'</div>';}

function deskRegion(rk,rtl){const reg=REGIONS[rk],p=ap(),rP=p[rk]||{},rR=S.results[rk]||{};let rounds=[];let cur=reg.games.map(g=>({s1:g[0],t1:g[1],s2:g[2],t2:g[3]}));for(let rd=0;rd<4;rd++){const rdP=rP[rd]||{},rdR=rR[rd]||{};let gm="";for(let i=0;i<cur.length;i++){const g=cur[i];gm+='<div class="bracket-game">'+dtr(g.t1,rd===0?g.s1:null,rdP[i],rdR[i],rk,rd,i)+dtr(g.t2,rd===0?g.s2:null,rdP[i],rdR[i],rk,rd,i)+'</div>';}rounds.push('<div class="round-col"><div class="round-col-header">'+RN_SHORT[rd]+'</div>'+gm+'</div>');let nx=[];for(let i=0;i<cur.length;i+=2)nx.push({t1:rdP[i]||null,t2:rdP[i+1]||null});cur=nx;}return'<div class="region-bracket"><div class="region-label" style="color:'+reg.color+'">'+reg.emoji+' '+reg.name+'</div><div class="rounds'+(rtl?" rtl":"")+'">'+(rtl?rounds.reverse().join(""):rounds.join(""))+'</div></div>';}

function deskFF(){const p=ap(),ch=RK.map(r=>(p[r]||{})[3]?.[0]||null),ffP=p.finalFour||{},ffR=S.results.finalFour||{};const s1P=(ffP[0]||{})[0],s2P=(ffP[0]||{})[1],cP=(ffP[1]||{})[0],s1R=(ffR[0]||{})[0],s2R=(ffR[0]||{})[1],cR=(ffR[1]||{})[0];let h='<div class="ff-center"><div class="ff-title">🏆 Final Four</div><div class="ff-game"><div class="ff-game-label">East vs South</div><div class="bracket-game">'+dtr(ch[0],null,s1P,s1R,"finalFour",0,0)+dtr(ch[1],null,s1P,s1R,"finalFour",0,0)+'</div></div><div class="ff-game"><div class="ff-game-label">Championship</div><div class="bracket-game">'+dtr(s1P,null,cP,cR,"finalFour",1,0)+dtr(s2P,null,cP,cR,"finalFour",1,0)+'</div></div><div class="ff-game"><div class="ff-game-label">West vs Midwest</div><div class="bracket-game">'+dtr(ch[2],null,s2P,s2R,"finalFour",0,1)+dtr(ch[3],null,s2P,s2R,"finalFour",0,1)+'</div></div>';if(cP)h+='<div class="champion-display"><div class="label">'+(S.viewing||"Your")+' Champion</div><div class="name">🏆 '+cP+'</div></div>';h+='</div>';return h;}

function render(){
if(S.screen==="pin"){document.getElementById("app").innerHTML='<div class="gate"><div class="gate-emoji">🏀</div><div class="gate-sub">2026 NCAA Tournament</div><div class="gate-title">BEAUBOUEF BRACKET</div><input id="pi" type="tel" inputmode="numeric" maxlength="4" placeholder="Enter PIN" style="letter-spacing:8px;font-size:20px" onkeydown="if(event.key===\'Enter\')checkPin()" autofocus><button class="gate-btn" onclick="checkPin()">Enter</button><div id="pe" class="gate-err"></div></div>';return;}
if(S.screen==="login"){let pb="";if(S.players.length){pb='<div class="player-list">';S.players.forEach(p=>{pb+='<button class="player-btn" onclick="loginExisting(\''+esc(p)+'\')">'+p+'<span class="arrow">→</span></button>';});pb+='</div>';}document.getElementById("app").innerHTML='<div class="gate"><div class="gate-emoji">🏀</div><div class="gate-sub">Welcome</div><div class="gate-title">WHO ARE YOU?</div>'+(S.players.length?'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Returning? Tap your name:</div>'+pb+'<div class="gate-divider">or new player</div>':'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Enter your name to get started</div>')+'<input id="fn" placeholder="First name" autocapitalize="words"><input id="ln" placeholder="Last name" autocapitalize="words" onkeydown="if(event.key===\'Enter\')loginNew()"><button class="gate-btn" onclick="loginNew()">Join</button><div id="le" class="gate-err"></div></div>';return;}

const tabs=["east","south","west","midwest","f4","board","admin"],labels={east:"E",south:"S",west:"W",midwest:"MW",f4:"🏆",board:"📊",admin:"⚙️"};
const dtabs=["bracket","board","admin"],dlabels={bracket:"Bracket",board:"Leaderboard",admin:"Admin"};
let mt=tabs.map(t=>'<button class="mob-tab'+(t===S.tab?" active":"")+((["f4","board","admin"].includes(t))?" icon":"")+'" onclick="S.tab=\''+t+'\';render()">'+labels[t]+'</button>').join("");
let dn=dtabs.map(t=>'<button class="desk-nav-btn'+(t===S.deskTab?" active":"")+'" onclick="S.deskTab=\''+t+'\';render()">'+dlabels[t]+'</button>').join("");
let vo='<option value="">My Bracket</option>';S.players.forEach(p=>{if(p!==S.user)vo+='<option value="'+esc(p)+'"'+(S.viewing===p?" selected":"")+'>'+p+'</option>';});
let vb='<div class="view-bar"><label>Viewing:</label><select onchange="viewUser(this.value)">'+vo+'</select></div>';
let badges="";if(S.locked)badges+='<span class="topbar-badge badge-locked">Locked</span>';if(S.saving)badges+='<span class="topbar-badge badge-saving">Saving</span>';if(S.viewing)badges+='<span class="topbar-badge badge-viewing">👀 '+S.viewing+'</span>';
let mc="";if(RK.includes(S.tab))mc=mobRegion(S.tab);else if(S.tab==="f4")mc=mobFF();else if(S.tab==="admin")mc=mobAdmin();else if(S.tab==="board")mc='<div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div>';
let dc="";if(S.deskTab==="bracket")dc='<div class="bracket-wrap"><div class="bracket-side">'+deskRegion("east",false)+deskRegion("south",false)+'</div><div class="bracket-center">'+deskFF()+'</div><div class="bracket-side">'+deskRegion("west",true)+deskRegion("midwest",true)+'</div></div>';else if(S.deskTab==="admin")dc='<div style="max-width:500px;margin:20px auto;padding:0 16px">'+mobAdmin()+'</div>';else if(S.deskTab==="board")dc='<div id="db" style="max-width:500px;margin:20px auto;padding:0 16px"><div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div></div>';
document.getElementById("app").innerHTML='<div class="topbar"><div><div class="topbar-brand">Beaubouef Bracket \'26</div><div class="topbar-user">'+S.user+'</div></div><div class="topbar-right">'+badges+'<button class="btn-sm" onclick="switchUser()">Switch</button></div></div>'+(S.msg?'<div class="msg-bar">'+S.msg+'</div>':"")+vb+'<div class="mobile-view"><div class="mob-tabs">'+mt+'</div><div class="mob-content" id="tc">'+mc+'</div></div><div class="desktop-bracket"><div class="desk-nav">'+dn+'<button class="desk-nav-btn" onclick="doSync()" style="margin-left:20px">🔄 Sync ESPN</button></div>'+dc+'</div><div class="footer">'+countPicks(ap())+'/63 picks'+(S.viewing?" ("+S.viewing+")":"")+" · "+(S.lastSync?"Last sync: "+S.lastSync:"Auto-sync every 5 min")+'</div>';
if(S.tab==="board")renderBoard("tc");if(S.deskTab==="board")renderBoard("db");
}
init();
</script>
